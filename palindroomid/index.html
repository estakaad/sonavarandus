<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Sõnavarandus - Palindroomid</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #body { display: flex; flex: 1; overflow: hidden; background: var(--bg); }
  #list-wrap { flex: 1; overflow-y: auto; padding: 16px 24px 40px; }

  .length-group { margin-bottom: 16px; }

  .length-heading {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 8px;
  }
  .length-badge {
    font-size: 16px; font-weight: 600; color: var(--text);
    letter-spacing: 0.5px;
  }
  .length-count {
    font-size: 11px; color: var(--text-muted);
  }

  .word-pill {
    display: inline-block; margin: 2px 3px 2px 0;
    padding: 4px 12px; border-radius: 16px; font-size: 13px;
    background: var(--surface-alt); color: var(--text-sec);
    cursor: default; transition: background .1s, color .1s;
    letter-spacing: 0.5px;
  }
  .word-pill:hover {
    background: var(--accent-light); color: var(--accent);
  }
  .word-pill.dim { opacity: 0.3; }
</style>
</head>
<body>

<a class="skip-link" href="#body">Hüppa põhisisu juurde</a>

<div class="app-header">
  <a class="nav-brand" href="../index.html">Sõnavarandus</a>
  <div id="top-nav-mount"></div>
  <div class="header-end">
    <a href="../info.html" style="font-size: 12px; color: var(--text-dim); text-decoration: none; transition: color 0.2s;">Info</a>
  </div>
</div>

<div id="body">
  <div id="list-wrap">
    <div class="page-info-accordion">
      <div class="page-info-header">
        <span class="page-info-icon">ℹ</span>
        <span class="page-info-title">Palindroomid</span>
        <span class="page-info-toggle">−</span>
      </div>
      <div class="page-info-body">
        <p class="page-info-desc">Sõnad, mis tagurpidi loetuna annavad sama sõna.</p>
      </div>
    </div>
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px; justify-content: space-between;">
      <div id="info" class="header-info" style="font-size: 12px; color: var(--text-muted);"></div>
      <input id="search" class="text-input" type="text" placeholder="Otsi…" style="width: 200px;" autocomplete="off" spellcheck="false">
    </div>
    <div id="list"></div>
  </div>
</div>

<script src="../js/utils.js"></script>
<script>
let allGroups = [];

// Accordion toggle
document.querySelector(".page-info-header").addEventListener("click", function() {
  const body = this.nextElementSibling;
  const toggle = this.querySelector(".page-info-toggle");
  body.style.display = getComputedStyle(body).display === "none" ? "block" : "none";
  toggle.textContent = getComputedStyle(body).display === "none" ? "+" : "−";
});

function render(query) {
  const q = query.trim().toLowerCase();
  const list = document.getElementById("list");
  list.innerHTML = "";

  let totalVisible = 0;

  allGroups.forEach(g => {
    const matched = q
      ? g.words.filter(w => w.toLowerCase().includes(q))
      : g.words;
    if (!matched.length && q) return;

    totalVisible += matched.length;

    const section = document.createElement("div");
    section.className = "length-group";

    const heading = document.createElement("div");
    heading.className = "length-heading";
    heading.innerHTML = `
      <span class="length-badge">${g.length}-tähelised</span>
      <span class="length-count">${matched.length}</span>`;
    section.appendChild(heading);

    const pills = document.createElement("div");
    g.words.forEach(w => {
      const pill = wordLink(w, "word-pill" + (q && !matched.includes(w) ? " dim" : ""));
      pills.appendChild(pill);
    });
    section.appendChild(pills);
    list.appendChild(section);
  });

  document.getElementById("info").textContent =
    q ? `${totalVisible} vastet` : `${allGroups.reduce((s,g) => s + g.words.length, 0)} palindroomi`;
}

document.getElementById("search").addEventListener("input", function() {
  render(this.value);
});

fetch("../data/palindromes.json")
  .then(r => r.json())
  .then(data => {
    allGroups = data.groups;

    // Arvuta statistikat
    const totalWords = allGroups.reduce((sum, g) => sum + g.words.length, 0);
    const minLen = Math.min(...allGroups.map(g => g.length));
    const maxLen = Math.max(...allGroups.map(g => g.length));


    render("");
  })
  .catch(() => {
    document.getElementById("list").textContent =
      "⚠ palindromes.json puudub — käivita prepare_data.py";
  });
</script>

<script src="../js/nav-config.js"></script>
<script src="../js/nav-render.js"></script>


</body>
</html>
