<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Sõnavarandus - Reduplikatsioonid</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #body { flex: 1; overflow-y: auto; padding: 16px 24px 40px; background: var(--bg); }
  .length-group { margin-bottom: 24px; }
  .length-heading { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
  .length-badge { font-size: 18px; font-weight: 300; color: var(--text); }
  .length-count { font-size: 12px; color: var(--text-muted); }
  .word-pill {
    display: inline-block; margin: 3px 4px 3px 0;
    padding: 5px 14px; border-radius: 20px; font-size: 14px;
    background: var(--surface-alt); color: var(--text-sec);
    letter-spacing: 2px; transition: background .1s, color .1s;
    text-decoration: none;
  }
  .word-pill:hover { background: var(--accent-light); color: var(--accent); }
</style>
</head>
<body>

<a class="skip-link" href="#body">Hüppa põhisisu juurde</a>
<div class="app-header">
  <a class="nav-brand" href="../index.html">Sõnavarandus</a>
  <div id="top-nav-mount"></div>
  <div class="header-end">
    <a href="../info.html" style="font-size: 12px; color: var(--text-dim); text-decoration: none; transition: color 0.2s;">Info</a>
  </div>
</div>
<div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px; justify-content: space-between; padding: 16px 24px 0 24px;">
  <div id="info" class="header-info" style="font-size: 12px; color: var(--text-muted);"></div>
</div>
<div id="body"></div>
<script>
fetch("../data/reduplications.json").then(r=>r.json()).then(data => {
  const body = document.getElementById("body");
  data.groups.forEach(g => {
    const sec = document.createElement("div");
    sec.className = "length-group";
    sec.innerHTML = `<div class="length-heading">
      <span class="length-badge">${g.length}-tähelised</span>
      <span class="length-count">${g.words.length}</span></div>`;
    const pills = document.createElement("div");
    g.words.forEach(w => {
      const pill = document.createElement("a");
      pill.href = `https://sonaveeb.ee/search/unif/dlall/dsall/${encodeURIComponent(w)}/1/est`;
      pill.target = "_blank";
      pill.rel = "noopener";
      pill.className = "word-pill";
      // Erista pooli: esimene pool + teine pool erinevalt
      const half = w.length / 2;
      pill.innerHTML = `<span style="color:var(--accent)">${w.slice(0,half)}</span><span style="opacity:.6">${w.slice(half)}</span>`;
      pills.appendChild(pill);
    });
    sec.appendChild(pills);
    body.appendChild(sec);
  });
  document.getElementById("info").textContent = `${data.total} sõna`;
}).catch(() => { document.getElementById("body").textContent = "⚠ reduplications.json puudub — käivita prepare_data.py"; });
</script>


<script src="../js/nav-config.js"></script>
<script src="../js/nav-render.js"></script>
</body>
</html>
