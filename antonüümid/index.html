<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sõnavarandus - Antonüümid</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #body { display: flex; flex: 1; overflow: hidden; background: var(--bg); }
  #list-wrap { flex: 1; overflow-y: auto; padding: 16px 24px 40px; }

  .row {
    display: flex; align-items: baseline; gap: 10px;
    padding: 6px 8px; border-radius: var(--radius-sm);
  }
  .row-word { font-size: 13px; font-weight: 600; color: var(--text); min-width: 180px; flex-shrink: 0; }
  .row-sep  { font-size: 13px; color: var(--text-ghost); flex-shrink: 0; }
  .row-ants { flex: 1; font-size: 13px; color: var(--text-sec); flex-wrap: wrap; display: flex; gap: 4px; }

  .word-pill {
    display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px;
    background: var(--surface-alt); color: var(--text-sec);
    text-decoration: none; transition: background .1s, color .1s;
  }
  .word-pill:hover { background: var(--accent-light); color: var(--accent); }

  #pager {
    display: none; align-items: center; justify-content: center;
    gap: 16px; padding: 16px 0 8px;
  }
  #pg-numbers { display: flex; align-items: center; gap: 8px; }
  .pg-btn {
    width: 36px; height: 36px; padding: 0; border: 1px solid var(--border);
    border-radius: 50%; background: var(--bg); color: var(--text-sec);
    font-size: 12px; cursor: pointer; transition: all .1s; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .pg-btn:hover:not(:disabled) { background: var(--surface-alt); border-color: var(--accent); }
  .pg-btn.current { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<a class="skip-link" href="#body">Hüppa põhisisu juurde</a>

<div class="app-header">
  <a class="nav-brand" href="../index.html">Sõnavarandus</a>
  <div id="top-nav-mount"></div>
  <div class="header-end">
    <a href="../info.html" style="font-size: 12px; color: var(--text-dim); text-decoration: none; transition: color 0.2s;">Info</a>
  </div>
</div>

<div id="body">
  <div id="list-wrap">
    <div class="page-info-accordion open">
      <div class="page-info-header">
        <span class="page-info-icon">ℹ</span>
        <span class="page-info-title">Antonüümid</span>
        <span class="page-info-toggle">−</span>
      </div>
      <div class="page-info-body open">
        <div class="page-info-desc">Antonüümid on vastupidise tähendusega sõnad. Mõnel sõnal on mitu antonüümi — näiteks <em>vaene</em> vastandub nii <em>rikas</em>, <em>jõukas</em> kui <em>rahakas</em>.</div>
      </div>
    </div>

    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px; justify-content: space-between;">
      <div id="info" style="font-size: 12px; color: var(--text-muted);"></div>
      <input id="search" class="text-input" type="text" placeholder="Otsi sõna…" style="width: 200px;" autocomplete="off" spellcheck="false">
    </div>

    <div id="list"></div>
    <div id="pager">
      <button type="button" class="btn btn-sm" id="pg-prev">← Eelmine</button>
      <div id="pg-numbers"></div>
      <button type="button" class="btn btn-sm" id="pg-next">Järgmine →</button>
    </div>
  </div>
</div>

<script>
const PAGE_SIZE = 50;
let allPairs = [], currentPairs = [], currentPage = 1;

function buildRow(d) {
  const row = document.createElement("div");
  row.className = "row";
  const pills = d.antonyms
    .map(w => `<a class="word-pill" href="https://sonaveeb.ee/search/unif/dlall/dsall/${encodeURIComponent(w)}/1/est" target="_blank" rel="noopener">${w}</a>`)
    .join("");
  row.innerHTML = `
    <span class="row-word"><a href="https://sonaveeb.ee/search/unif/dlall/dsall/${encodeURIComponent(d.word)}/1/est" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${d.word}</a></span>
    <span class="row-sep">↔</span>
    <span class="row-ants">${pills}</span>`;
  return row;
}

function renderList(pairs) {
  currentPairs = pairs;
  const list  = document.getElementById("list");
  const start = (currentPage - 1) * PAGE_SIZE;
  list.innerHTML = "";
  pairs.slice(start, start + PAGE_SIZE).forEach(d => list.appendChild(buildRow(d)));
  document.getElementById("list-wrap").scrollTop = 0;
  renderPager();
}

function renderPager() {
  const totalPages = Math.ceil(currentPairs.length / PAGE_SIZE);
  const pager = document.getElementById("pager");
  pager.style.display = totalPages > 1 ? "flex" : "none";
  const numbersDiv = document.getElementById("pg-numbers");
  numbersDiv.innerHTML = "";

  const range = 5;
  let start = Math.max(1, currentPage - Math.floor(range / 2));
  let end   = Math.min(totalPages, start + range - 1);
  if (end - start < range - 1) start = Math.max(1, end - range + 1);

  if (start > 1) {
    const b = document.createElement("button"); b.className = "pg-btn"; b.textContent = "1";
    b.onclick = () => { currentPage = 1; renderList(currentPairs); }; numbersDiv.appendChild(b);
    if (start > 2) { const d = document.createElement("span"); d.textContent = "…"; d.style.opacity = "0.5"; numbersDiv.appendChild(d); }
  }
  for (let i = start; i <= end; i++) {
    const b = document.createElement("button");
    b.className = `pg-btn ${i === currentPage ? "current" : ""}`; b.textContent = i;
    b.onclick = () => { currentPage = i; renderList(currentPairs); }; numbersDiv.appendChild(b);
  }
  if (end < totalPages) {
    if (end < totalPages - 1) { const d = document.createElement("span"); d.textContent = "…"; d.style.opacity = "0.5"; numbersDiv.appendChild(d); }
    const b = document.createElement("button"); b.className = "pg-btn"; b.textContent = totalPages;
    b.onclick = () => { currentPage = totalPages; renderList(currentPairs); }; numbersDiv.appendChild(b);
  }
  document.getElementById("pg-prev").disabled = currentPage <= 1;
  document.getElementById("pg-next").disabled = currentPage >= totalPages;
}

document.getElementById("pg-prev").addEventListener("click", () => {
  if (currentPage > 1) { currentPage--; renderList(currentPairs); }
});
document.getElementById("pg-next").addEventListener("click", () => {
  if (currentPage < Math.ceil(currentPairs.length / PAGE_SIZE)) { currentPage++; renderList(currentPairs); }
});

document.getElementById("search").addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  const filtered = q
    ? allPairs.filter(d =>
        d.word.toLowerCase().includes(q) ||
        d.antonyms.some(a => a.toLowerCase().includes(q)))
    : allPairs;
  currentPage = 1;
  renderList(filtered);
  document.getElementById("info").textContent = `${filtered.length} sõna`;
});

document.querySelector(".page-info-header").addEventListener("click", function() {
  const body = this.nextElementSibling;
  const toggle = this.querySelector(".page-info-toggle");
  body.classList.toggle("open");
  toggle.textContent = body.classList.contains("open") ? "−" : "+";
});

fetch("../data/antonüümid.json")
  .then(r => r.json())
  .then(data => {
    allPairs = data.pairs;
    document.getElementById("info").textContent = `${allPairs.length} sõna`;
    renderList(allPairs);
  })
  .catch(() => {
    document.getElementById("list").textContent =
      "⚠ antonüümid.json puudub — käivita prepare_data.py";
  });
</script>

<script src="../js/nav-config.js"></script>
<script src="../js/nav-render.js"></script>
</body>
</html>
