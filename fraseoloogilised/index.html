<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sõnavarandus - Fraseoloogilised väljendid</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #body { display: flex; flex: 1; overflow: hidden; }
    #list-wrap { flex: 1; overflow-y: auto; padding: 16px 24px 40px; background: var(--bg); }

    .row {
      display: flex; align-items: center; gap: 12px;
      padding: 5px 8px; border-radius: var(--radius-sm);
      cursor: pointer; transition: background .12s;
    }
    .row:hover    { background: var(--row-hover); }
    .row.selected { background: var(--row-selected); }

    .category {
      width: 200px; flex-shrink: 0; font-size: 13px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .bar-wrap { flex: 1; height: 12px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .bar { height: 100%; border-radius: 3px; background: var(--accent); transition: width .3s ease; }
    .num {
      width: 32px; flex-shrink: 0; text-align: right;
      font-size: 12px; color: var(--text-dim); font-variant-numeric: tabular-nums;
    }

    #panel.open { width: 520px; }
    #panel-inner { width: 520px; overflow-y: hidden; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
    #p-meta { flex-shrink: 0; }
    #p-category { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    #p-count { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
    #p-expressions { flex: 1; overflow-y: auto; font-size: 13px; }
    .expr { padding: 8px 12px; margin-bottom: 6px; background: var(--surface);
            border-radius: var(--radius-sm); border-left: 3px solid var(--accent); }
    .expr-text {
      font-weight: 500; color: var(--accent); text-decoration: none; display: block;
      margin-bottom: 3px;
    }
    .expr-text:hover { text-decoration: underline; }
    .expr-def { font-size: 12px; color: var(--text-muted); line-height: 1.3; }
    #p-pager {
      flex-shrink: 0; display: none; align-items: center; justify-content: center;
      gap: 8px; padding: 12px 0 4px; border-top: 1px solid var(--border); margin-top: 8px;
    }
    #p-pg-numbers { display: flex; align-items: center; gap: 4px; }

    #pager {
      display: none; align-items: center; justify-content: center;
      gap: 16px; padding: 16px 0 8px; flex-wrap: nowrap;
    }
    #pg-numbers {
      display: flex; align-items: center; gap: 8px;
    }
    .pg-btn {
      width: 36px; height: 36px; padding: 0; border: 1px solid var(--border);
      border-radius: 50%; background: var(--bg); color: var(--text-sec);
      font-size: 12px; cursor: pointer; transition: all .1s; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .pg-btn:hover:not(:disabled) { background: var(--surface-alt); border-color: var(--accent); }
    .pg-btn.current { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
    .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<a class="skip-link" href="#body">Hüppa põhisisu juurde</a>

<div class="app-header">
  <a class="nav-brand" href="../index.html">Sõnavarandus</a>
  <div id="top-nav-mount"></div>
  <div class="header-end">
    <a href="../info.html" style="font-size: 12px; color: var(--text-dim); text-decoration: none; transition: color 0.2s;">Info</a>
  </div>
</div>

<div id="body">
  <div id="list-wrap">
    <div class="page-info-accordion">
      <div class="page-info-header">
        <span class="page-info-icon">ℹ</span>
        <span class="page-info-title">Fraseoloogilised väljendid</span>
        <span class="page-info-toggle">−</span>
      </div>
      <div class="page-info-body open" id="info-body">
        <p class="page-info-desc">Klassifitseeritud fraseoloogilised väljendid rühmitatud semantiliste kategooriate kaupa.</p>
      </div>
    </div>

    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px; justify-content: space-between;">
      <div id="count-info" style="font-size: 12px; color: var(--text-muted);"></div>
      <input id="search" class="text-input" type="text" placeholder="Otsi kategooriast…" style="width: 200px;" autocomplete="off" spellcheck="false">
    </div>
    <div id="list"></div>
    <div id="pager">
      <button type="button" class="btn btn-sm" id="pg-prev">← Eelmine</button>
      <div id="pg-numbers"></div>
      <button type="button" class="btn btn-sm" id="pg-next">Järgmine →</button>
    </div>
  </div>

  <div id="panel" class="side-panel">
    <div id="panel-inner" class="side-panel__inner">
      <div id="p-meta">
        <div id="p-category"></div>
        <div id="p-count"></div>
      </div>
      <div id="p-expressions"></div>
      <div id="p-pager">
        <button type="button" class="btn btn-sm" id="p-pg-prev">← Eelmine</button>
        <div id="p-pg-numbers"></div>
        <button type="button" class="btn btn-sm" id="p-pg-next">Järgmine →</button>
      </div>
    </div>
  </div>
</div>

<script>
const PAGE_SIZE = 20;
let allCategories = [], currentCategories = [], maxCount = 1, currentPage = 1;

function buildRow(cat) {
  const row = document.createElement("div");
  row.className = "row";
  const pct = (cat.count / maxCount * 100).toFixed(1);
  row.innerHTML = `
    <span class="category">${cat.name || '(Klassifitseerimata)'}</span>
    <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
    <span class="num">${cat.count}</span>`;
  row.addEventListener("click", () => openPanel(cat, row));
  return row;
}

function renderList(categories) {
  currentCategories = categories;
  maxCount = categories.length ? Math.max(...categories.map(c => c.count)) : 1;
  const list  = document.getElementById("list");
  const start = (currentPage - 1) * PAGE_SIZE;
  list.innerHTML = "";
  categories.slice(start, start + PAGE_SIZE).forEach(cat => list.appendChild(buildRow(cat)));
  document.getElementById("list-wrap").scrollTop = 0;
  renderPager();
}

function renderPager() {
  const total      = currentCategories.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const pager      = document.getElementById("pager");
  pager.style.display = totalPages > 1 ? "flex" : "none";

  // Render page numbers with range
  const numbersDiv = document.getElementById("pg-numbers");
  numbersDiv.innerHTML = "";

  const range = 5;
  let start = Math.max(1, currentPage - Math.floor(range / 2));
  let end = Math.min(totalPages, start + range - 1);
  if (end - start < range - 1) start = Math.max(1, end - range + 1);

  // Always show page 1
  if (start > 1) {
    const btn1 = document.createElement("button");
    btn1.className = "pg-btn";
    btn1.textContent = "1";
    btn1.onclick = () => { currentPage = 1; renderList(currentCategories); };
    numbersDiv.appendChild(btn1);

    if (start > 2) {
      const dots = document.createElement("span");
      dots.textContent = "…";
      dots.style.opacity = "0.5";
      numbersDiv.appendChild(dots);
    }
  }

  for (let i = start; i <= end; i++) {
    const btn = document.createElement("button");
    btn.className = `pg-btn ${i === currentPage ? "current" : ""}`;
    btn.textContent = i;
    btn.onclick = () => { currentPage = i; renderList(currentCategories); };
    numbersDiv.appendChild(btn);
  }

  // Always show last page
  if (end < totalPages) {
    if (end < totalPages - 1) {
      const dots = document.createElement("span");
      dots.textContent = "…";
      dots.style.opacity = "0.5";
      numbersDiv.appendChild(dots);
    }

    const btnLast = document.createElement("button");
    btnLast.className = "pg-btn";
    btnLast.textContent = totalPages;
    btnLast.onclick = () => { currentPage = totalPages; renderList(currentCategories); };
    numbersDiv.appendChild(btnLast);
  }

  document.getElementById("pg-prev").disabled = currentPage <= 1;
  document.getElementById("pg-next").disabled = currentPage >= totalPages;
}

document.getElementById("pg-prev").addEventListener("click", () => {
  if (currentPage > 1) { currentPage--; renderList(currentCategories); }
});
document.getElementById("pg-next").addEventListener("click", () => {
  if (currentPage < Math.ceil(currentCategories.length / PAGE_SIZE)) { currentPage++; renderList(currentCategories); }
});

// Accordion toggle
document.querySelector(".page-info-header").addEventListener("click", function() {
  const body = document.getElementById("info-body");
  const toggle = this.querySelector(".page-info-toggle");
  const isOpen = body.style.display !== "none";
  body.style.display = isOpen ? "none" : "block";
  toggle.textContent = isOpen ? "+" : "−";
});

const P_PAGE_SIZE = 8;
let currentExpressions = [], currentExprPage = 1;

function renderExprPage(page) {
  const start = (page - 1) * P_PAGE_SIZE;
  const pageItems = currentExpressions.slice(start, start + P_PAGE_SIZE);
  document.getElementById("p-expressions").innerHTML = pageItems.map(ex => `
    <div class="expr">
      <a class="expr-text" href="https://sonaveeb.ee/search/unif/dlall/dsall/${encodeURIComponent(ex.keelend)}/1/est" target="_blank" rel="noopener">${escapeHtml(ex.keelend)}</a>
      <div class="expr-def">${escapeHtml(ex.definition || '')}</div>
    </div>`).join("");
  document.getElementById("p-expressions").scrollTop = 0;

  const totalPages = Math.ceil(currentExpressions.length / P_PAGE_SIZE);
  const pager = document.getElementById("p-pager");
  pager.style.display = totalPages > 1 ? "flex" : "none";

  const numbersDiv = document.getElementById("p-pg-numbers");
  numbersDiv.innerHTML = "";
  const range = 5;
  let s = Math.max(1, page - Math.floor(range / 2));
  let e = Math.min(totalPages, s + range - 1);
  if (e - s < range - 1) s = Math.max(1, e - range + 1);
  if (s > 1) {
    addPgBtn(numbersDiv, "1", () => renderExprPage(1));
    if (s > 2) { const d = document.createElement("span"); d.textContent = "…"; d.style.opacity = ".5"; numbersDiv.appendChild(d); }
  }
  for (let i = s; i <= e; i++) addPgBtn(numbersDiv, i, () => renderExprPage(i), i === page);
  if (e < totalPages) {
    if (e < totalPages - 1) { const d = document.createElement("span"); d.textContent = "…"; d.style.opacity = ".5"; numbersDiv.appendChild(d); }
    addPgBtn(numbersDiv, totalPages, () => renderExprPage(totalPages));
  }
  document.getElementById("p-pg-prev").disabled = page <= 1;
  document.getElementById("p-pg-next").disabled = page >= totalPages;
  currentExprPage = page;
}

function addPgBtn(parent, label, onclick, current = false) {
  const btn = document.createElement("button");
  btn.className = "pg-btn" + (current ? " current" : "");
  btn.textContent = label;
  btn.onclick = onclick;
  parent.appendChild(btn);
}

function openPanel(cat, row) {
  document.querySelectorAll(".row.selected").forEach(r => r.classList.remove("selected"));
  if (row) row.classList.add("selected");

  document.getElementById("p-category").textContent = cat.name || '(Klassifitseerimata)';
  document.getElementById("p-count").textContent = `${cat.count} väljendit`;
  currentExpressions = cat.expressions;
  currentExprPage = 1;
  renderExprPage(1);

  document.getElementById("panel").classList.add("open");
}

document.getElementById("p-pg-prev").addEventListener("click", () => {
  if (currentExprPage > 1) renderExprPage(currentExprPage - 1);
});
document.getElementById("p-pg-next").addEventListener("click", () => {
  if (currentExprPage < Math.ceil(currentExpressions.length / P_PAGE_SIZE)) renderExprPage(currentExprPage + 1);
});

function escapeHtml(text) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return text.replace(/[&<>"']/g, m => map[m]);
}

document.getElementById("search").addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  const filtered = q ? allCategories.filter(c => (c.name || '').toLowerCase().includes(q)) : allCategories;
  currentPage = 1;
  renderList(filtered);
  document.getElementById("count-info").textContent = `${filtered.length} kategooriaid`;
});

fetch("../data/fraseoloogilised.json")
  .then(r => r.json())
  .then(data => {
    allCategories = data.categories;
    const totalExpr = data.total;

    document.getElementById("count-info").textContent = `${allCategories.length} kategooriaid`;

    renderList(allCategories);
    if (allCategories.length) openPanel(allCategories[0], null);
  })
  .catch(() => {
    document.getElementById("list").textContent =
      "⚠ fraseoloogilised.json puudub — käivita prepare_data.py";
  });
</script>

<script src="../js/nav-config.js"></script>
<script src="../js/nav-render.js"></script>
</body>
</html>
