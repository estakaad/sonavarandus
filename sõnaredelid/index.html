<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sõnavarandus - Sõnaredelid</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #body { display: flex; flex: 1; overflow: hidden; flex-direction: column; background: var(--bg); }

  .page-info-accordion {
    flex-shrink: 0;
    margin: 0; padding: 12px 24px;
    border: none; border-radius: 0;
    border-bottom: 1px solid var(--border);
  }
  .page-info-accordion .page-info-body {
    display: none;
    padding: 12px 0;
  }
  .page-info-accordion .page-info-body.open {
    display: block;
  }

  #wrap { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }

  /* ── Sisendid ─────────────────────────────────────────── */
  #inputs { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
  .input-group { position: relative; width: 180px; }
  .input-group .text-input { width: 100%; }

  .autocomplete-list {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
    z-index: 50;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    max-height: 240px;
    overflow-y: auto;
  }
  .sug-item {
    padding: 7px 16px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-sec);
    transition: background .1s;
  }
  .sug-item:hover,
  .sug-item.active {
    background: var(--row-hover);
    color: var(--accent-hover);
  }

  #inputs-sep { color: var(--text-muted); font-size: 20px; }

  /* ── Nupud ─────────────────────────────────────────── */
  #btn-row { display: flex; gap: 12px; margin-bottom: 24px; }
  .btn { font-size: 13px; }

  /* ── Teade ja ahel ────────────────────────────────────── */
  #msg { min-height: 20px; font-size: 13px; color: var(--text-sec); margin-bottom: 16px; text-align: center; }

  #chain {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    max-width: 100%;
    overflow-x: auto;
    padding: 16px 20px;
    background: var(--surface-alt);
    border-radius: 8px;
    margin-bottom: 16px;
    white-space: nowrap;
  }
  #chain::-webkit-scrollbar { height: 4px; }
  #chain::-webkit-scrollbar-thumb { background: var(--text-ghost); border-radius: 2px; }

  .ladder-node {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 14px;
    font-family: monospace;
    letter-spacing: 1px;
    white-space: nowrap;
    animation: fadeIn .3s ease both;
    flex-shrink: 0;
  }
  .ladder-node.start,
  .ladder-node.end {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
  }

  .ladder-node .diff-letter {
    color: var(--accent);
    font-weight: 700;
  }

  .ladder-arrow {
    font-size: 14px;
    color: var(--text-muted);
    padding: 0 4px;
    animation: fadeIn .3s ease both;
    flex-shrink: 0;
  }

  #path-len { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; text-align: center; }

  /* ── Pikim ahel sektsioon ─────────────────────────────── */
  #longest-section {
    margin-top: 32px;
    width: 100%;
    max-width: 900px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }
  .section-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    text-align: center;
  }

  #longest-chain {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0;
  }

  #longest-len { font-size: 12px; color: var(--text-muted); margin-top: 8px; text-align: center; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<a class="skip-link" href="#body">Hüppa põhisisu juurde</a>

<div class="app-header">
  <a class="nav-brand" href="../index.html">Sõnavarandus</a>
  <div id="top-nav-mount"></div>
  <div class="header-end">
    <a href="../info.html" style="font-size: 12px; color: var(--text-dim); text-decoration: none; transition: color 0.2s;">Info</a>
  </div>
</div>

<div id="body">
  <div class="page-info-accordion">
    <div class="page-info-header">
      <span class="page-info-icon">ℹ</span>
      <span class="page-info-title">Sõnaredelid</span>
      <span class="page-info-toggle">−</span>
    </div>
    <div class="page-info-body open">
      <p class="page-info-desc">Muuda sõnas üht tähte, et saada teine sõna.</p>
      <div class="page-info-stats" id="page-stats">
        <div class="stat-row"><span class="stat-label">Kokku</span><span class="stat-value" id="stat-total">–</span></div>
      </div>
    </div>
  </div>

  <div id="wrap">
    <div id="inputs">
      <div class="input-group">
        <input id="w1" class="text-input" type="text" placeholder="Algussõna…"
               autocomplete="off" spellcheck="false">
        <div class="autocomplete-list" id="sug1"></div>
      </div>
      <span id="inputs-sep">→</span>
      <div class="input-group">
        <input id="w2" class="text-input" type="text" placeholder="Lõppsõna…"
               autocomplete="off" spellcheck="false">
        <div class="autocomplete-list" id="sug2"></div>
      </div>
    </div>

    <div id="btn-row">
      <button id="btn-find" type="button" class="btn btn-primary">Leia redel</button>
      <button id="btn-random" type="button" class="btn">Juhuslik paar</button>
    </div>

    <div id="path-len"></div>
    <div id="msg"></div>
    <div id="chain"></div>

    <div id="longest-section">
      <div class="section-label">Pikim ahel andmebaasist</div>
      <div id="longest-chain"></div>
      <div id="longest-len"></div>
    </div>
  </div>
</div>


<script>
let graph = {}, words = [], longestData = null;
let randomByLength = null;

// ── Andmete laadimine ──────────────────────────────────

fetch("data/ladder.json")
  .then(r => r.json())
  .then(data => {
    graph = data.graph;
    words = data.words;
    longestData = data.longest;
    document.getElementById("stat-total").textContent =
      data.words.length.toLocaleString("et-EE");
    renderLongest();
  })
  .catch(() => {
    document.getElementById("msg").textContent =
      "⚠ ladder.json puudub — käivita prepare_data.py";
  });

// Accordion toggle
document.querySelector(".page-info-header").addEventListener("click", function() {
  const body = this.nextElementSibling;
  const toggle = this.querySelector(".page-info-toggle");
  const isOpen = body.classList.toggle("open");
  toggle.textContent = isOpen ? "−" : "+";
});

// ── Automaattäiendus ──────────────────────────────────

function setupAutocomplete(inputId, sugId) {
  const inp = document.getElementById(inputId);
  const list = document.getElementById(sugId);
  let activeIdx = -1;

  inp.addEventListener("input", function() {
    const q = this.value.trim().toLowerCase();
    if (!q) {
      list.innerHTML = "";
      list.style.display = "none";
      activeIdx = -1;
      return;
    }
    const filtered = words.filter(w => w.toLowerCase().startsWith(q)).slice(0, 8);
    list.innerHTML = filtered.map((w, i) =>
      `<div class="sug-item" data-idx="${i}">${w}</div>`
    ).join("");
    list.style.display = filtered.length ? "block" : "none";
    activeIdx = -1;

    list.querySelectorAll(".sug-item").forEach(item => {
      item.addEventListener("click", () => {
        inp.value = item.textContent;
        list.innerHTML = "";
        list.style.display = "none";
        activeIdx = -1;
      });
    });
  });

  inp.addEventListener("keydown", function(e) {
    const items = list.querySelectorAll(".sug-item");
    if (e.key === "ArrowDown") {
      e.preventDefault();
      activeIdx = Math.min(activeIdx + 1, items.length - 1);
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      activeIdx = Math.max(activeIdx - 1, -1);
    } else if (e.key === "Enter") {
      e.preventDefault();
      if (activeIdx >= 0 && items[activeIdx]) {
        inp.value = items[activeIdx].textContent;
        list.innerHTML = "";
        list.style.display = "none";
        activeIdx = -1;
      }
    } else if (e.key === "Escape") {
      list.innerHTML = "";
      list.style.display = "none";
      activeIdx = -1;
    } else if (e.key === "Tab") {
      list.innerHTML = "";
      list.style.display = "none";
      activeIdx = -1;
    }

    items.forEach((item, i) => {
      item.classList.toggle("active", i === activeIdx);
    });
  });

  document.addEventListener("click", (e) => {
    if (!inp.contains(e.target) && !list.contains(e.target)) {
      list.style.display = "none";
    }
  });
}

setupAutocomplete("w1", "sug1");
setupAutocomplete("w2", "sug2");

// ── BFS teekonna leidmine ──────────────────────────────

function findPath(start, end) {
  if (!graph[start] || !graph[end]) return null;
  if (start === end) return [start];

  const queue = [[start]];
  const visited = new Set([start]);
  let checked = 0;

  while (queue.length) {
    const path = queue.shift();
    const cur = path[path.length - 1];

    for (const nb of (graph[cur] || [])) {
      if (nb === end) return [...path, nb];
      if (!visited.has(nb)) {
        visited.add(nb);
        if (path.length < 25) queue.push([...path, nb]);
        if (++checked > 50000) return null;
      }
    }
  }
  return null;
}

// ── Muutunud tähe leidmine ────────────────────────────

function diffLetter(a, b) {
  for (let i = 0; i < a.length; i++) {
    if (a[i] !== b[i]) return i;
  }
  return -1;
}

// ── Ahela kuvamine ─────────────────────────────────────

function renderChain(path, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  path.forEach((word, i) => {
    if (i > 0) {
      const arr = document.createElement("span");
      arr.className = "ladder-arrow";
      arr.textContent = "→";
      arr.style.animationDelay = `${(i - 1) * 80 + 40}ms`;
      container.appendChild(arr);
    }

    const node = document.createElement("a");
    node.href = `https://sonaveeb.ee/search/unif/dlall/dsall/${encodeURIComponent(word)}/1/est`;
    node.target = "_blank";
    node.rel = "noopener";
    node.className = "ladder-node"
      + (i === 0 ? " start" : "")
      + (i === path.length - 1 ? " end" : "");
    node.style.animationDelay = `${i * 80}ms`;

    if (i === 0) {
      node.textContent = word;
    } else {
      const pos = diffLetter(path[i - 1], word);
      let html = "";
      for (let j = 0; j < word.length; j++) {
        if (j === pos) {
          html += `<span class="diff-letter">${word[j]}</span>`;
        } else {
          html += word[j];
        }
      }
      node.innerHTML = html;
    }
    container.appendChild(node);
  });
}

function setMsg(text) {
  document.getElementById("msg").textContent = text;
}

// ── "Leia redel" nupp ──────────────────────────────────

document.getElementById("btn-find").addEventListener("click", () => {
  const a = document.getElementById("w1").value.trim().toLowerCase();
  const b = document.getElementById("w2").value.trim().toLowerCase();

  if (!a || !b) {
    setMsg("Mõlemad sõnad peavad olema täidetud.");
    return;
  }
  if (a === b) {
    setMsg("Sama sõna — vali kaks erinevat sõna.");
    return;
  }
  if (!graph[a]) {
    setMsg(`„${a}" ei leidu sõnastikus.`);
    return;
  }
  if (!graph[b]) {
    setMsg(`„${b}" ei leidu sõnastikus.`);
    return;
  }
  if (a.length !== b.length) {
    setMsg("Sõnaredelid töötavad ainult sama pikkusega sõnade vahel.");
    return;
  }

  setMsg("Otsin redelit…");
  document.getElementById("chain").innerHTML = "";
  document.getElementById("path-len").textContent = "";

  setTimeout(() => {
    const path = findPath(a, b);
    if (!path) {
      setMsg(`Redel sõnade „${a}" ja „${b}" vahel puudub.`);
    } else {
      setMsg("");
      renderChain(path, "chain");
      const steps = path.length - 1;
      document.getElementById("path-len").textContent =
        steps === 1 ? "1 samm" : `${steps} sammu`;
    }
  }, 20);
});

// ── Juhuslik paar ─────────────────────────────────────

function buildRandomIndex() {
  randomByLength = {};
  for (const w of words) {
    const len = w.length;
    if (!randomByLength[len]) randomByLength[len] = [];
    randomByLength[len].push(w);
  }
}

document.getElementById("btn-random").addEventListener("click", () => {
  if (!words.length) return;

  setTimeout(() => {
    if (!randomByLength) buildRandomIndex();

    for (let attempt = 0; attempt < 50; attempt++) {
      const lens = Object.keys(randomByLength).filter(l => randomByLength[l].length >= 2);
      if (!lens.length) break;

      const len = lens[Math.floor(Math.random() * lens.length)];
      const group = randomByLength[len];
      const a = group[Math.floor(Math.random() * group.length)];
      const b = group[Math.floor(Math.random() * group.length)];

      if (a === b) continue;

      const path = findPath(a, b);
      if (path && path.length >= 5 && path.length <= 9) {
        document.getElementById("w1").value = a;
        document.getElementById("w2").value = b;
        setMsg("");
        renderChain(path, "chain");
        const steps = path.length - 1;
        document.getElementById("path-len").textContent =
          steps === 1 ? "1 samm" : `${steps} sammu`;
        return;
      }
    }

    // Fallback: mis tahes kehtiv tee
    const lens = Object.keys(randomByLength).filter(l => randomByLength[l].length >= 2);
    if (lens.length) {
      const len = lens[Math.floor(Math.random() * lens.length)];
      const group = randomByLength[len];
      let found = false;
      for (const start of group.slice(0, 50)) {
        for (const end of group.slice(0, 50)) {
          if (start !== end) {
            const path = findPath(start, end);
            if (path && path.length >= 2) {
              document.getElementById("w1").value = start;
              document.getElementById("w2").value = end;
              setMsg("");
              renderChain(path, "chain");
              const steps = path.length - 1;
              document.getElementById("path-len").textContent =
                steps === 1 ? "1 samm" : `${steps} sammu`;
              found = true;
              break;
            }
          }
        }
        if (found) break;
      }
    }
  }, 20);
});

// ── Pikim ahel ─────────────────────────────────────────

function renderLongest() {
  if (!longestData || !longestData.path) return;
  renderChain(longestData.path, "longest-chain");
  const steps = longestData.steps;
  document.getElementById("longest-len").textContent =
    steps === 1 ? "1 samm" : `${steps} sammu`;
}
</script>

<script src="../js/nav-config.js"></script>
<script src="../js/nav-render.js"></script>
</body>
</html>
