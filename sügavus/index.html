<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Sõnavarandus - Liitsõnade sügavus</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #body { display: flex; flex: 1; overflow: hidden; background: var(--bg); }
  #list-wrap { flex: 1; overflow-y: auto; padding: 16px 24px 40px; }

  /* ── ahela rida ── */
  .chain-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 8px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background .1s;
  }
  .chain-row:hover    { background: var(--row-hover); }
  .chain-row.selected { background: var(--row-selected); }

  .depth-badge {
    flex-shrink: 0; width: 28px; height: 20px;
    background: var(--accent-light); color: var(--accent);
    font-size: 11px; font-weight: 700;
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
  }
  .chain-pills { display: flex; align-items: center; flex-wrap: wrap; gap: 0; flex: 1; }
  .chain-pill {
    font-size: 13px; color: var(--text-sec);
    padding: 2px 8px; border-radius: 4px;
    transition: color .1s, background .1s;
    text-decoration: none;
  }
  .chain-pill:hover  { color: var(--accent); background: var(--accent-light); }
  .chain-pill.first  { font-weight: 600; color: var(--text-dim); }
  .chain-pill.last   { font-weight: 700; color: var(--text); }
  .chain-arrow { font-size: 11px; color: var(--text-ghost); padding: 0 1px; }

  /* ── paneel ── */
  #p-word  { font-size: 24px; font-weight: 300; color: var(--text); margin-bottom: 2px; }
  #p-meta  { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
  .sep     { height: 1px; background: var(--surface-alt); margin: 12px 0; }
  .p-label { font-size: 10px; color: var(--text-muted); letter-spacing: 1px;
             text-transform: uppercase; margin-bottom: 10px; }

  /* ── puu ── */
  .tree-node { display: flex; flex-direction: column; }
  .tree-row  {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 4px; border-radius: 4px; cursor: pointer;
    transition: background .1s;
  }
  .tree-row:hover { background: var(--row-hover); }
  .tree-toggle {
    width: 14px; flex-shrink: 0; font-size: 10px;
    color: var(--text-ghost); text-align: center;
    transition: transform .15s;
  }
  .tree-toggle.open { transform: rotate(90deg); }
  .tree-word  { font-size: 13px; color: var(--accent); text-decoration: none; transition: color .1s; }
  .tree-word:hover { color: var(--accent-hover); text-decoration: underline; }
  .tree-count { font-size: 11px; color: var(--text-ghost); }
  .tree-children {
    padding-left: 20px;
    border-left: 1px solid var(--border);
    margin-left: 6px; margin-top: 1px;
    display: none;
  }
  .tree-children.open { display: block; }

  #pager {
    display: none; align-items: center; justify-content: center;
    gap: 16px; padding: 16px 0 8px; flex-wrap: nowrap;
  }
  #pg-numbers {
    display: flex; align-items: center; gap: 8px;
  }
  .pg-btn {
    width: 36px; height: 36px; padding: 0; border: 1px solid var(--border);
    border-radius: 50%; background: var(--bg); color: var(--text-sec);
    font-size: 12px; cursor: pointer; transition: all .1s; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .pg-btn:hover:not(:disabled) { background: var(--surface-alt); border-color: var(--accent); }
  .pg-btn.current { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<a class="skip-link" href="#body">Hüppa põhisisu juurde</a>

<div class="app-header">
  <a class="nav-brand" href="../index.html">Sõnavarandus</a>
  <div id="top-nav-mount"></div>
  <div class="header-end">
    <a href="../info.html" style="font-size: 12px; color: var(--text-dim); text-decoration: none; transition: color 0.2s;">Info</a>
  </div>
</div>

<div id="body">
  <div id="list-wrap">
    <div class="page-info-accordion" style="margin-bottom: 16px;">
      <div class="page-info-header" id="accordion-toggle" style="cursor: pointer;">
        <span class="page-info-icon">ℹ</span>
        <span class="page-info-title">Liitsõnade sügavus</span>
        <span class="page-info-toggle" id="accordion-arrow">−</span>
      </div>
      <div class="page-info-body" id="accordion-body" style="display: block;">
        <p class="page-info-desc">Kui liitsõna koosneb teistest liitsõnadest.</p>
      </div>
    </div>

    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px; justify-content: space-between;">
      <div id="info" class="header-info" style="font-size: 12px; color: var(--text-muted);"></div>
      <input id="search" class="text-input" type="text" placeholder="Otsi…" style="width: 200px;" autocomplete="off" spellcheck="false">
    </div>
    <div id="list"></div>
    <div id="pager">
      <button type="button" class="btn btn-sm" id="pg-prev">← Eelmine</button>
      <div id="pg-numbers"></div>
      <button type="button" class="btn btn-sm" id="pg-next">Järgmine →</button>
    </div>
  </div>

  <div id="panel" class="side-panel">
    <div id="panel-inner" class="side-panel__inner">
      <div id="p-word"></div>
      <div id="p-meta"></div>
      <div class="sep"></div>
      <div class="p-label">Liitsõnade puu</div>
      <div id="p-tree"></div>
    </div>
  </div>
</div>

<script>
const PAGE_SIZE = 20;
let allChains = [], currentChains = [], compoundMap = {}, currentPage = 1;

// ── ahela ridade ehitamine ─────────────────────────────────
function buildRow(item) {
  const row = document.createElement("div");
  row.className = "chain-row";

  const badge = document.createElement("span");
  badge.className = "depth-badge";
  badge.textContent = item.depth;
  row.appendChild(badge);

  const pills = document.createElement("div");
  pills.className = "chain-pills";

  item.chain.forEach((word, i) => {
    if (i > 0) {
      const arr = document.createElement("span");
      arr.className = "chain-arrow";
      arr.textContent = "→";
      pills.appendChild(arr);
    }
    const pill = document.createElement("span");
    pill.className = "chain-pill" +
      (i === 0 ? " first" : "") +
      (i === item.chain.length - 1 ? " last" : "");
    pill.textContent = word;
    pill.style.cursor = "pointer";
    pill.addEventListener("click", e => { e.stopPropagation(); openPanel(word); });
    pills.appendChild(pill);
  });
  row.appendChild(pills);

  row.addEventListener("click", () => openPanel(item.chain[item.chain.length - 1]));
  return row;
}

function renderList(chains) {
  currentChains = chains;
  const list = document.getElementById("list");
  const start = (currentPage - 1) * PAGE_SIZE;
  list.innerHTML = "";
  chains.slice(start, start + PAGE_SIZE).forEach(item => list.appendChild(buildRow(item)));
  document.getElementById("list-wrap").scrollTop = 0;
  renderPager();
}

function renderPager() {
  const totalPages = Math.ceil(currentChains.length / PAGE_SIZE);
  const pager = document.getElementById("pager");
  pager.style.display = totalPages > 1 ? "flex" : "none";

  const numbersDiv = document.getElementById("pg-numbers");
  numbersDiv.innerHTML = "";

  const range = 5;
  let start = Math.max(1, currentPage - Math.floor(range / 2));
  let end = Math.min(totalPages, start + range - 1);
  if (end - start < range - 1) start = Math.max(1, end - range + 1);

  if (start > 1) {
    const btn1 = document.createElement("button");
    btn1.className = "pg-btn";
    btn1.textContent = "1";
    btn1.onclick = () => { currentPage = 1; renderList(currentChains); };
    numbersDiv.appendChild(btn1);

    if (start > 2) {
      const dots = document.createElement("span");
      dots.textContent = "…";
      dots.style.opacity = "0.5";
      numbersDiv.appendChild(dots);
    }
  }

  for (let i = start; i <= end; i++) {
    const btn = document.createElement("button");
    btn.className = `pg-btn ${i === currentPage ? "current" : ""}`;
    btn.textContent = i;
    btn.onclick = () => { currentPage = i; renderList(currentChains); };
    numbersDiv.appendChild(btn);
  }

  if (end < totalPages) {
    if (end < totalPages - 1) {
      const dots = document.createElement("span");
      dots.textContent = "…";
      dots.style.opacity = "0.5";
      numbersDiv.appendChild(dots);
    }

    const btnLast = document.createElement("button");
    btnLast.className = "pg-btn";
    btnLast.textContent = totalPages;
    btnLast.onclick = () => { currentPage = totalPages; renderList(currentChains); };
    numbersDiv.appendChild(btnLast);
  }

  document.getElementById("pg-prev").disabled = currentPage <= 1;
  document.getElementById("pg-next").disabled = currentPage >= totalPages;
}

document.getElementById("pg-prev").addEventListener("click", () => {
  if (currentPage > 1) { currentPage--; renderList(currentChains); }
});
document.getElementById("pg-next").addEventListener("click", () => {
  if (currentPage < Math.ceil(currentChains.length / PAGE_SIZE)) { currentPage++; renderList(currentChains); }
});

// ── puu ehitamine ──────────────────────────────────────────
function buildTreeNode(word, depth = 0) {
  const children = compoundMap[word] || [];
  const node = document.createElement("div");
  node.className = "tree-node";

  const rowEl = document.createElement("div");
  rowEl.className = "tree-row";

  const toggle = document.createElement("span");
  toggle.className = "tree-toggle";
  toggle.textContent = children.length ? "▶" : "";
  if (children.length) {
    toggle.style.cursor = "pointer";
  }
  rowEl.appendChild(toggle);

  const wordEl = document.createElement("a");
  wordEl.href = `https://sonaveeb.ee/search/unif/dlall/dsall/${encodeURIComponent(word)}/1/est`;
  wordEl.target = "_blank";
  wordEl.rel = "noopener";
  wordEl.className = "tree-word";
  wordEl.textContent = word;
  rowEl.appendChild(wordEl);

  if (children.length) {
    const cnt = document.createElement("span");
    cnt.className = "tree-count";
    cnt.textContent = `(${children.length})`;
    rowEl.appendChild(cnt);
  }

  node.appendChild(rowEl);

  if (children.length) {
    const childWrap = document.createElement("div");
    childWrap.className = "tree-children";

    let built = false;
    toggle.addEventListener("click", e => {
      e.stopPropagation();
      const open = childWrap.classList.toggle("open");
      toggle.classList.toggle("open", open);
      if (open && !built) {
        children.forEach(child => childWrap.appendChild(buildTreeNode(child, depth + 1)));
        built = true;
      }
    });
    node.appendChild(childWrap);
  }

  return node;
}

// ── paneel ────────────────────────────────────────────────
function openPanel(word) {
  document.querySelectorAll(".chain-row.selected").forEach(r => r.classList.remove("selected"));

  const children = compoundMap[word] || [];
  document.getElementById("p-word").textContent = word;
  document.getElementById("p-meta").textContent =
    children.length
      ? `esineb ${children.length} liitsõna komponendina`
      : "ei esine ühengi teise liitsõna komponendina";

  const tree = document.getElementById("p-tree");
  tree.innerHTML = "";
  const rootNode = buildTreeNode(word);
  // ava esimene tase automaatselt
  const firstRow = rootNode.querySelector(".tree-row");
  if (firstRow && children.length) firstRow.click();
  tree.appendChild(rootNode);

  document.getElementById("panel").classList.add("open");
}

// ── otsing ────────────────────────────────────────────────
document.getElementById("search").addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  if (!q) {
    currentPage = 1;
    renderList(allChains);
    document.getElementById("info").textContent = `${allChains.length} ahelat`;
    return;
  }
  // Otsi ahelatest mis sisaldavad seda sõna
  const filtered = allChains.filter(item =>
    item.chain.some(w => w.toLowerCase().includes(q))
  );
  currentPage = 1;
  renderList(filtered);
  document.getElementById("info").textContent = `${filtered.length} ahelat`;

  // Kui täpne vaste, ava paneel
  const exact = Object.keys(compoundMap).find(w => w.toLowerCase() === q);
  if (exact) openPanel(exact);
});

// ── accordion toggle ──────────────────────────────────────
document.getElementById("accordion-toggle").addEventListener("click", function() {
  const body = document.getElementById("accordion-body");
  const arrow = document.getElementById("accordion-arrow");
  const isOpen = body.style.display === "block";
  body.style.display = isOpen ? "none" : "block";
  arrow.textContent = isOpen ? "+" : "−";
});

// ── lae andmed ────────────────────────────────────────────
fetch("../data/depth.json")
  .then(r => r.json())
  .then(data => {
    allChains    = data.top_chains;
    compoundMap  = data.compound_map;
    const maxD   = allChains[0]?.depth ?? 0;
    const totalCompounds = Object.keys(compoundMap).length;

    document.getElementById("info").textContent =
      `${allChains.length} ahelat · max sügavus ${maxD}`;
    renderList(allChains);
  })
  .catch(() => {
    document.getElementById("list").textContent =
      "⚠ depth.json puudub — käivita prepare_data.py";
  });
</script>


<script src="../js/nav-config.js"></script>
<script src="../js/nav-render.js"></script>
</body>
</html>
