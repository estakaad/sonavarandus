<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Sõnavarandus - Kärpimisahelad</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #body { display: flex; flex: 1; overflow: hidden; background: var(--bg); }
  #list-wrap { flex: 1; overflow-y: auto; padding: 16px 24px 40px; }

  .chain-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px; border-radius: var(--radius-sm);
    transition: background .1s;
  }
  .chain-row:hover { background: var(--row-hover); }

  .depth-badge {
    flex-shrink: 0; width: 26px; height: 20px;
    background: var(--accent-light); color: var(--accent);
    font-size: 11px; font-weight: 700;
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
  }
  .chain-pills { display: flex; align-items: center; flex-wrap: wrap; gap: 0; flex: 1; }
  .chain-pill {
    font-size: 13px; color: var(--text-sec);
    padding: 2px 8px; border-radius: 4px;
    transition: color .1s, background .1s;
  }
  .chain-pill:hover  { color: var(--accent); background: var(--accent-light); }
  .chain-pill.first  { font-weight: 600; color: var(--text); }
  .chain-pill.last   { color: var(--text-dim); font-size: 12px; }
  .chain-arrow { font-size: 11px; color: var(--text-ghost); padding: 0 2px; }

  #pager {
    display: none; align-items: center; justify-content: center;
    gap: 12px; padding: 16px 0 8px;
  }
  #pg-info { font-size: 12px; color: var(--text-muted); min-width: 60px; text-align: center; }
</style>
</head>
<body>

<a class="skip-link" href="#body">Hüppa põhisisu juurde</a>
<div class="app-header">
  <a class="nav-brand" href="../index.html">Sõnavarandus</a>
  <div id="top-nav-mount"></div>
  <div class="header-end">
    <span id="info" class="header-info"></span>
    <input id="search" class="text-input" type="text" placeholder="Otsi sõna…"
           style="width:180px" autocomplete="off" spellcheck="false">
    <a href="../info.html" style="font-size: 12px; color: var(--text-dim); text-decoration: none; transition: color 0.2s;">Info</a>
  </div>
</div>
<div id="body">
  <div id="list-wrap">
    <div id="list"></div>
    <div id="pager">
      <button type="button" class="btn btn-sm" id="pg-prev">← Eelmine</button>
      <span id="pg-info"></span>
      <button type="button" class="btn btn-sm" id="pg-next">Järgmine →</button>
    </div>
  </div>
</div>
<script src="../js/utils.js"></script>
<script>
const PAGE_SIZE = 60;
let allChains = [], currentChains = [], currentPage = 1;

function buildRow(item) {
  const row = document.createElement("div");
  row.className = "chain-row";

  const badge = document.createElement("span");
  badge.className = "depth-badge";
  badge.textContent = item.depth;
  row.appendChild(badge);

  const pills = document.createElement("div");
  pills.className = "chain-pills";

  item.chain.forEach((word, i) => {
    if (i > 0) {
      const arr = document.createElement("span");
      arr.className = "chain-arrow";
      arr.textContent = "→";
      pills.appendChild(arr);
    }
    const pill = wordLink(word, "chain-pill"
      + (i === 0 ? " first" : "")
      + (i === item.chain.length - 1 ? " last" : ""));
    pills.appendChild(pill);
  });
  row.appendChild(pills);
  return row;
}

function renderList(chains) {
  currentChains = chains;
  const list  = document.getElementById("list");
  const start = (currentPage - 1) * PAGE_SIZE;
  list.innerHTML = "";
  chains.slice(start, start + PAGE_SIZE).forEach(c => list.appendChild(buildRow(c)));
  document.getElementById("list-wrap").scrollTop = 0;
  renderPager();
}

function renderPager() {
  const total = Math.ceil(currentChains.length / PAGE_SIZE);
  const pager = document.getElementById("pager");
  pager.style.display = total > 1 ? "flex" : "none";
  document.getElementById("pg-info").textContent = `${currentPage} / ${total}`;
  document.getElementById("pg-prev").disabled = currentPage <= 1;
  document.getElementById("pg-next").disabled = currentPage >= total;
}

document.getElementById("pg-prev").addEventListener("click", () => { if (currentPage > 1) { currentPage--; renderList(currentChains); } });
document.getElementById("pg-next").addEventListener("click", () => { if (currentPage < Math.ceil(currentChains.length / PAGE_SIZE)) { currentPage++; renderList(currentChains); } });

document.getElementById("search").addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  const filtered = q ? allChains.filter(c => c.chain.some(w => w.includes(q))) : allChains;
  currentPage = 1; renderList(filtered);
  document.getElementById("info").textContent = q ? `${filtered.length} ahelat` : `${allChains.length} ahelat`;
});

fetch("../data/beheadments.json").then(r=>r.json()).then(data => {
  allChains = data.chains;
  const maxD = allChains[0]?.depth ?? 0;
  document.getElementById("info").textContent = `${allChains.length} ahelat · max ${maxD}`;
  renderList(allChains);
}).catch(() => { document.getElementById("list").textContent = "⚠ beheadments.json puudub — käivita prepare_data.py"; });
</script>


<script src="../js/nav-config.js"></script>
<script src="../js/nav-render.js"></script>
</body>
</html>
