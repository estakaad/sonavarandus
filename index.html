<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Keele peal</title>
<link rel="stylesheet" href="css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .header { padding: 24px 28px; text-align: center; border-bottom: 2px solid var(--accent); background: linear-gradient(to right, var(--surface), var(--accent-light)); }
  .header h1 { font-size: 36px; font-weight: 400; letter-spacing: 8px; color: var(--accent); margin: 0; text-transform: uppercase; }
  .header p { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; margin: 6px 0 0 0; font-style: italic; text-transform: uppercase; }

  .main-content { display: flex; flex: 1; overflow: hidden; }

  .sidebar { width: 240px; border-right: 1px solid var(--border); overflow-y: auto; background: var(--surface-alt); }
  .menu-category {
    border-bottom: 1px solid var(--border);
  }
  .menu-category-header {
    padding: 12px 16px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background .2s;
    user-select: none;
  }
  .menu-category-header:hover { background: var(--bg); color: var(--accent); }
  .menu-category-header.active { background: var(--bg); color: var(--accent); }
  .menu-toggle { font-size: 10px; transition: transform .2s; }
  .menu-toggle.open { transform: rotate(90deg); }

  .menu-items { display: none; padding: 0 0 8px 0; }
  .menu-items.open { display: block; }
  .menu-item {
    padding: 8px 24px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-sec);
    transition: all .2s;
    border-left: 2px solid transparent;
  }
  .menu-item:hover { background: var(--bg); color: var(--accent); border-left-color: var(--accent); padding-left: 22px; }
  .menu-item.active { background: var(--bg); color: var(--accent); border-left-color: var(--accent); padding-left: 22px; }

  .content { flex: 1; overflow-y: auto; padding: 20px 28px; display: none; }
  .content.active { display: block; }
  .content-heading { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 16px; letter-spacing: 0.5px; text-transform: uppercase; }
  .cards { display: flex; flex-wrap: wrap; gap: 12px; }
  .cards .card { flex: 1 1 260px; }

  .side-panel {
    width: 0;
    flex-shrink: 0;
    overflow: hidden;
    transition: width .28s ease;
    border-left: 1px solid var(--border);
    background: var(--surface);
  }
  .side-panel.open { width: 300px; }

  .side-panel__inner {
    width: 300px;
    padding: 20px;
    height: 100%;
    overflow-y: auto;
    box-sizing: border-box;
  }
  .panel-title { font-size: 24px; font-weight: 300; letter-spacing: 1px; color: var(--text); margin-bottom: 8px; }
  .panel-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }
  .panel-button { display: inline-block; padding: 10px 20px; background: var(--accent); color: #fff; text-decoration: none; border-radius: 6px; font-size: 12px; font-weight: 600; transition: all .2s; }
  .panel-button:hover { background: var(--accent-hover); transform: translateY(-2px); }
</style>
</head>
<body>

<a class="skip-link" href="#main">Hüppa põhisisu juurde</a>

<div class="header" id="main">
  <h1>Keele peal</h1>
  <p>Sõnade uurimine</p>
</div>

<div class="main-content">
  <div class="sidebar" id="menu">
    <!-- Menüü genereeritakse JavaScriptiga -->
  </div>

  <div class="content" id="content">
    <!-- Sisu näidatakse paremal -->
  </div>

  <div class="side-panel" id="panel">
    <div class="side-panel__inner" id="panel-inner">
      <!-- Kaardi info -->
    </div>
  </div>
</div>

<footer class="app-footer">
  <a class="footer-link" href="info.html">Info</a>
  <span class="footer-sep" aria-hidden="true">·</span>
  <a class="footer-link" href="kontakt.html">Kontakt</a>
</footer>

<script>
const categories = [
  {
    name: 'Tähendused',
    cards: [
      { icon: '🌌', name: 'Sõnavõrgustik', desc: 'Liigu mööda tähendustevahelisi seoseid ja vaata, kuhu sedasi sattuda võib.', href: 'galaktika/index.html' },
      { icon: '📊', name: 'Polüseemia', desc: 'Sõnad reastatud tähenduste arvu järgi.', href: 'polüseemia/index.html' },
      { icon: '🔗', name: 'Tähenduste kiirtee', desc: 'Leia tähendustevahelisi seoseid pidi liikudes lühim tee ühest sõnast teiseni.', href: 'sõnatee/index.html' },
      { icon: '🗂️', name: 'Registrimaatriks', desc: 'Registrimärgendiga sõnad.', href: 'registrid/index.html' },
      { icon: '≈', name: 'Sünonüümitihedus', desc: 'Sünonüümid on eri sõnad, mis on sama tähendusega.', href: 'sünonüümid/index.html' },
    ]
  },
  {
    name: 'Liitsõnad',
    cards: [
      { icon: '📐', name: 'Produktiivsed liitujad', desc: 'Millised sõnad moodustavad kõige rohkem liitsõnu?', href: 'produktiivsus/index.html' },
      { icon: '🪆', name: 'Liitsõnade sügavus', desc: 'Kui liitsõna koosneb teistest liitsõnadest.', href: 'sügavus/index.html' },
    ]
  },
  {
    name: 'Sõnade tähed',
    cards: [
      { icon: '↔', name: 'Palindroomid', desc: 'Sõnad, mis tagurpidi loetuna annavad sama sõna.', href: 'palindroomid/index.html' },
      { icon: '⇄', name: 'Anagrammipaarid', desc: 'Samad tähed, eri sõnad.', href: 'anagrammid/index.html' },
      { icon: '⟷', name: 'Anadroomid', desc: 'Ühtepidi üks sõna, teistpidi teine sõna.', href: 'semordnilindid/index.html' },
      { icon: '±', name: 'Minimaalpaarid', desc: 'Sõnapaarid mis erinevad täpselt ühe tähe poolest.', href: 'minimaalpaarid/index.html' },
      { icon: '🔵', name: 'Ainult täishäälikud', desc: 'Sõnad mis koosnevad üksnes täishäälikutest', href: 'täishäälikud/index.html' },
      { icon: '⊞', name: 'Reduplikatsioonid', desc: 'Sõnad kus esimene pool kordab teist poolt', href: 'reduplikatsioonid/index.html' },
    ]
  },
  {
    name: 'Mängud & väljakutsed',
    cards: [
      { icon: '🪜', name: 'Sõnaredelid', desc: 'Muuda sõnas üht tähte, et saada teine sõna.', href: 'sõnaredelid/index.html' },
      { icon: '✂', name: 'Kärpimisahelad', desc: 'Sõnad, mille esimese tähe eemaldamisel tekib uus sõna.', href: 'kärpimine/index.html' },
      { icon: '🔠', name: 'Scrabble\'i punktid', desc: 'Millised eestikeelsed sõnad toovad Scrabble\'is kõige rohkem punkte?', href: 'skrabbl/index.html' },
    ]
  }
];

let selectedCard = null;

function renderMenu() {
  const menu = document.getElementById('menu');
  menu.innerHTML = '';

  categories.forEach((cat, catIdx) => {
    const catDiv = document.createElement('div');
    catDiv.className = 'menu-category';
    catDiv.innerHTML = `
      <div class="menu-category-header" data-cat="${catIdx}">
        <span>${cat.name}</span>
        <span class="menu-toggle">▶</span>
      </div>
      <div class="menu-items" data-cat="${catIdx}">
        ${cat.cards.map((card, cardIdx) => `
          <div class="menu-item" data-cat="${catIdx}" data-card="${cardIdx}">
            ${card.icon} ${card.name}
          </div>
        `).join('')}
      </div>
    `;
    menu.appendChild(catDiv);
  });

  // Category header click handlers
  document.querySelectorAll('.menu-category-header').forEach(header => {
    header.addEventListener('click', () => {
      const catIdx = header.dataset.cat;
      const items = document.querySelector(`.menu-items[data-cat="${catIdx}"]`);
      const toggle = header.querySelector('.menu-toggle');

      items.classList.toggle('open');
      toggle.classList.toggle('open');
      header.classList.toggle('active');
    });
  });

  // Card item click handlers
  document.querySelectorAll('.menu-item').forEach(item => {
    item.addEventListener('click', () => {
      const catIdx = parseInt(item.dataset.cat);
      const cardIdx = parseInt(item.dataset.card);
      const card = categories[catIdx].cards[cardIdx];

      // Update active state
      document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');

      // Show panel
      openPanel(card);
    });
  });
}

function openPanel(card) {
  const panelInner = document.getElementById('panel-inner');
  const panel = document.getElementById('panel');

  panelInner.innerHTML = `
    <div style="font-size: 32px; margin-bottom: 12px;">${card.icon}</div>
    <div class="panel-title">${card.name}</div>
    <div class="panel-desc">${card.desc}</div>
    <a class="panel-button" href="${card.href}">Avamine →</a>
  `;

  panel.classList.add('open');
  selectedCard = card;
}

renderMenu();
</script>

</body>
</html>
