<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sõnavarandus</title>
<link rel="stylesheet" href="css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

  main { flex: 1; overflow-y: auto; padding: 32px 40px 40px; background: transparent; position: relative; z-index: 1; }

  .category-section { margin-bottom: 48px; }
  .category-title {
    font-size: 18px; font-weight: 700; color: var(--text);
    letter-spacing: 0.5px; text-transform: uppercase;
    margin-bottom: 20px; padding: 12px 0; padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
    background: rgba(248, 250, 252, 0.8);
    position: relative;
  }

  .card-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px; margin-bottom: 8px;
  }

  .card {
    padding: 20px; background: rgba(255, 255, 255, 0.85); border: 1px solid var(--border);
    border-radius: var(--radius); cursor: pointer;
    transition: all .2s; text-decoration: none; color: inherit;
  }
  .card:hover {
    border-color: var(--accent); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
    transform: translateY(-2px);
  }

  .card-title {
    font-size: 16px; font-weight: 600; color: var(--text);
    margin-bottom: 8px; display: block;
  }
  .card-desc {
    font-size: 13px; color: var(--text-muted); line-height: 1.5;
  }

  #word-bg {
    position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
    z-index: 0; pointer-events: none; overflow: hidden;
    background: var(--bg);
  }

  .word-bg-item {
    position: absolute; white-space: nowrap;
    font-weight: 600; letter-spacing: 1px;
    animation: fall linear infinite;
    opacity: 0.25;
  }

  @keyframes fall {
    from { transform: translateY(-50px); opacity: 0.25; }
    to { transform: translateY(100vh); opacity: 0.1; }
  }
</style>
</head>
<body>

<a class="skip-link" href="main">Hüppa põhisisu juurde</a>

<div id="word-bg"></div>

<div class="app-header">
  <span class="nav-brand">Sõnavarandus</span>
  <div id="top-nav-mount"></div>
</div>

<main id="main">
  <!-- Categories rendered here -->
</main>

<footer class="app-footer">
  <a class="footer-link" href="info.html">Info</a>
  <span class="footer-sep" aria-hidden="true">·</span>
  <a class="footer-link" href="kontakt.html">Kontakt</a>
</footer>

<script src="js/nav-config.js"></script>

<script>
// Neon falling words with magnetic effect
function initWordBackground() {
  const wordBg = document.getElementById('word-bg');

  const words = [
    'andetu', 'hulljulgus', 'disahhariid', 'peidutama', 'sõjafotograaf',
    'selgejooneline', 'õhtukell', 'tänapäevane', 'lehitsema', 'bassklarnet',
    'gigant', 'radikaalravi', 'põllusaak', 'küdema', 'ebakindlam',
    'vereatsidoos', 'võimlemistund', 'skandaalne', 'päevarütm', 'vihmakile',
    'orangutang', 'baribal', 'kogunemisaeg', 'salvine', 'eluke',
    'puugipask', 'maksejõud', 'sigmasool', 'fonatsioon', 'säuk'
  ];

  // Color palette (using CSS variables)
  const colors = [
    'var(--text-dim)',
    'var(--text-muted)',
    'var(--accent)',
    '#1e40af',
    '#0f766e'
  ];

  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  const itemCount = 30;

  for (let i = 0; i < itemCount; i++) {
    const word = words[Math.floor(Math.random() * words.length)];
    const startX = Math.random() * window.innerWidth;
    const duration = 8 + Math.random() * 6; // 8-14 seconds fall
    const delay = Math.random() * 3; // stagger starts
    const size = 16 + Math.random() * 20; // 16-36px
    const color = colors[Math.floor(Math.random() * colors.length)];

    const div = document.createElement('div');
    div.className = 'word-bg-item';
    div.textContent = word;
    div.style.fontSize = size + 'px';
    div.style.color = color;
    div.style.left = startX + 'px';
    div.style.animation = `fall ${duration}s linear ${delay}s infinite`;

    // Magnetic effect on mouse move
    const updatePosition = () => {
      const rect = div.getBoundingClientRect();
      const dx = mouseX - rect.left;
      const dy = mouseY - rect.top;
      const distance = Math.sqrt(dx * dx + dy * dy);
      const maxDistance = 150;

      if (distance < maxDistance) {
        const force = (1 - distance / maxDistance) * 0.15;
        const angle = Math.atan2(dy, dx);
        const pushX = Math.cos(angle) * force * 50;
        const pushY = Math.sin(angle) * force * 50;
        div.style.transform = `translate(${pushX}px, ${pushY}px)`;
      } else {
        div.style.transform = '';
      }
    };

    div.addEventListener('mousemove', updatePosition);
    wordBg.appendChild(div);
  }
}

function renderHomepage() {
  // Homepage is now just the pulsing word background
  // No content cards displayed
}

initWordBackground();
renderHomepage();
</script>

<script src="js/nav-render.js"></script>

</body>
</html>
