<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sõnavarandus</title>
<link rel="stylesheet" href="css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

  main { flex: 1; overflow-y: auto; padding: 32px 40px 40px; background: transparent; position: relative; z-index: 1; }

  .category-section { margin-bottom: 48px; }
  .category-title {
    font-size: 18px; font-weight: 700; color: var(--text);
    letter-spacing: 0.5px; text-transform: uppercase;
    margin-bottom: 20px; padding: 12px 0; padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
    background: rgba(248, 250, 252, 0.8);
    position: relative;
  }

  .card-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px; margin-bottom: 8px;
  }

  .card {
    padding: 20px; background: rgba(255, 255, 255, 0.85); border: 1px solid var(--border);
    border-radius: var(--radius); cursor: pointer;
    transition: all .2s; text-decoration: none; color: inherit;
  }
  .card:hover {
    border-color: var(--accent); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
    transform: translateY(-2px);
  }

  .card-title {
    font-size: 16px; font-weight: 600; color: var(--text);
    margin-bottom: 8px; display: block;
  }
  .card-desc {
    font-size: 13px; color: var(--text-muted); line-height: 1.5;
  }

  #word-bg {
    position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    grid-auto-rows: 80px; gap: 20px;
    padding: 40px; z-index: 0;
    pointer-events: none; overflow: hidden;
  }

  .word-bg-item {
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; color: var(--text-ghost);
    opacity: 0.15; white-space: nowrap;
    animation: pulse-word 3s ease-in-out infinite;
  }

  @keyframes pulse-word {
    0%, 100% { opacity: 0.08; }
    50% { opacity: 0.22; }
  }
</style>
</head>
<body>

<a class="skip-link" href="main">Hüppa põhisisu juurde</a>

<div id="word-bg"></div>

<div class="app-header">
  <span class="nav-brand">Sõnavarandus</span>
  <div id="top-nav-mount"></div>
</div>

<main id="main">
  <!-- Categories rendered here -->
</main>

<footer class="app-footer">
  <a class="footer-link" href="info.html">Info</a>
  <span class="footer-sep" aria-hidden="true">·</span>
  <a class="footer-link" href="kontakt.html">Kontakt</a>
</footer>

<script src="js/nav-config.js"></script>

<script>
// Pulsing word background
function initWordBackground() {
  const wordBg = document.getElementById('word-bg');
  const words = [];

  // Collect all words from nav categories
  NAV_CATEGORIES.forEach(cat => {
    words.push(cat.name);
    cat.cards.forEach(card => words.push(card.name));
  });

  // Additional words to fill up the background
  const additionalWords = [
    'sõna', 'täht', 'tähendus', 'keeleteadus', 'lingvistika', 'sõnavara',
    'morfoloogia', 'süntaks', 'fonoloogia', 'semantika', 'pragmaatika',
    'sõnamoodustus', 'liitsõna', 'tuletis', 'lühend', 'murre'
  ];

  words.push(...additionalWords);

  // Shuffle and repeat to fill grid
  let shuffled = [...words];
  while (shuffled.length < 40) {
    shuffled = shuffled.concat([...words].sort(() => Math.random() - 0.5));
  }
  shuffled = shuffled.slice(0, 80).sort(() => Math.random() - 0.5);

  shuffled.forEach((word, i) => {
    const div = document.createElement('div');
    div.className = 'word-bg-item';
    div.textContent = word;
    div.style.animationDelay = (Math.random() * 2) + 's';
    wordBg.appendChild(div);
  });
}

function renderHomepage() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  NAV_CATEGORIES.forEach(cat => {
    const section = document.createElement('div');
    section.className = 'category-section';

    const title = document.createElement('div');
    title.className = 'category-title';
    title.textContent = cat.name;
    section.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'card-grid';
    cat.cards.forEach(card => {
      const cardEl = document.createElement('a');
      cardEl.className = 'card';
      // At root level, strip the '../' prefix from hrefs
      cardEl.href = card.href.replace('../', '');
      cardEl.innerHTML = `
        <span class="card-title">${card.name}</span>
        <div class="card-desc">${card.desc || ''}</div>
      `;
      grid.appendChild(cardEl);
    });
    section.appendChild(grid);

    main.appendChild(section);
  });
}

initWordBackground();
renderHomepage();
</script>

<script src="js/nav-render.js"></script>

</body>
</html>
