<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sõnavarandus - Lühiühendus</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #body { display: flex; flex: 1; overflow: hidden; background: var(--bg); }
  #list-wrap { flex: 1; overflow-y: auto; padding: 16px 24px 40px; }

  #wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 28px; padding: 32px 20px 20px;
  }

  /* ── sisestusalad ── */
  #inputs { display: flex; align-items: flex-end; gap: 10px; }
  .input-group { position: relative; display: flex; flex-direction: column; gap: 6px; }
  .input-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); }
  .word-input { width: 200px; font-size: 15px; padding: 9px 16px; }

  #btn-swap {
    flex-shrink: 0; width: 34px; height: 38px; padding: 0; margin-bottom: 1px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text-dim); font-size: 16px;
    cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center;
  }
  #btn-swap:hover { background: var(--surface-alt); color: var(--accent); border-color: var(--accent); }

  .suggestions {
    position: absolute; top: calc(100% + 2px); left: 0; width: 200px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; display: none; z-index: 50;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .sug-item { padding: 7px 14px; cursor: pointer; font-size: 14px; color: var(--text-sec); transition: background .1s; }
  .sug-item:hover, .sug-item.active { background: var(--row-hover); color: var(--accent); }

  /* ── nupud ── */
  #btn-row { display: flex; gap: 10px; }

  /* ── tulemus ── */
  #result { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  #msg { font-size: 15px; color: var(--text-muted); text-align: center; line-height: 1.6; }
  #path-len { font-size: 12px; color: var(--text-ghost); letter-spacing: .5px; }

  /* ── horisontaalne tee ── */
  #chain-wrap {
    width: 100%; overflow-x: auto; padding: 8px 0 16px;
  }
  #chain {
    display: flex; flex-direction: row; align-items: center;
    width: 100%; padding: 8px 4px;
  }

  .chain-node {
    flex-shrink: 0;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 24px; padding: 9px 20px;
    font-size: 15px; color: var(--text); white-space: nowrap;
    animation: popIn .25s ease both;
    cursor: default;
  }
  .chain-node.start {
    background: var(--accent); color: #fff; border-color: var(--accent);
    font-weight: 600;
  }
  .chain-node.end {
    background: var(--accent-light, #eff6ff); color: var(--accent);
    border-color: var(--accent); font-weight: 600;
  }

  .chain-connector {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 5px; padding: 0 2px;
    min-width: 60px; animation: popIn .25s ease both;
  }
  .conn-label {
    font-size: 10px; white-space: nowrap; letter-spacing: .3px;
    padding: 2px 6px; border-radius: 8px;
    background: var(--surface-alt, #f1f5f9); color: var(--text-sec);
  }
  .conn-line {
    width: 100%; height: 2px; position: relative;
    background: var(--border);
  }
  .conn-line::after {
    content: '';
    position: absolute; right: -1px; top: -4px;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    border-left: 7px solid var(--border);
  }

  .node-link { color: inherit; text-decoration: none; }
  .node-link:hover { text-decoration: underline; }

  @keyframes popIn {
    from { opacity: 0; transform: scale(.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  @media (max-width: 640px) {
    #wrap { padding: 16px 8px 20px; gap: 20px; }
    #inputs { flex-direction: column; align-items: stretch; }
    .word-input { width: 100%; }
    .suggestions { width: 100%; }
    #btn-swap { align-self: center; transform: rotate(90deg); }
    #btn-row { flex-wrap: wrap; }

    /* Vertikaalne ahel */
    #chain-wrap { overflow-x: visible; }
    #chain { flex-direction: column; align-items: center; width: auto; }
    .chain-connector { flex: none; min-width: 0; padding: 0; }
    .conn-line { width: 2px; height: 32px; }
    .conn-line::after {
      top: auto; bottom: -1px;
      right: auto; left: 50%; transform: translateX(-50%);
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-top: 7px solid var(--border);
      border-bottom: none;
    }
  }

</style>
</head>
<body>

<a class="skip-link" href="#wrap">Hüppa põhisisu juurde</a>

<div class="app-header">
  <a class="nav-brand" href="../index.html">Sõnavarandus</a>
  <div id="top-nav-mount"></div>
</div>

<div id="body">
  <div id="list-wrap">
    <div class="page-info-accordion">
      <div class="page-info-header">
        <span class="page-info-icon">ℹ</span>
        <span class="page-info-title">Lühiühendus</span>
        <span class="page-info-toggle">−</span>
      </div>
      <div class="page-info-body open">
        <p class="page-info-desc">Leia tähendustevahelisi seoseid pidi liikudes lühim tee ühest sõnast teiseni. Kuna seoseid pole määratud kõigile sõnadele, peab võib-olla mitme eri kombinatsiooniga proovima.</p>
      </div>
    </div>

    <div id="wrap">
      <div id="inputs">
        <div class="input-group">
          <span class="input-label">Algussõna</span>
          <input class="text-input word-input" id="w1" type="text" placeholder="nt käsi" autocomplete="off" spellcheck="false">
          <div class="suggestions" id="s1"></div>
        </div>
        <button type="button" id="btn-swap" title="Vaheta sõnad">⇄</button>
        <div class="input-group">
          <span class="input-label">Lõppsõna</span>
          <input class="text-input word-input" id="w2" type="text" placeholder="nt jalg" autocomplete="off" spellcheck="false">
          <div class="suggestions" id="s2"></div>
        </div>
      </div>

      <div id="btn-row">
        <button type="button" class="btn btn-primary" id="btn-find">Leia tee</button>
        <button type="button" class="btn" id="btn-random">Juhuslik paar</button>
      </div>

      <div id="result">
        <div id="msg">Sisesta kaks sõna ja vajuta "Leia tee"</div>
        <div id="path-len"></div>
        <div id="chain-wrap" style="display:none"><div id="chain"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
let adjacency = {}, allWords = [];

// Accordion toggle
document.querySelector(".page-info-header").addEventListener("click", function() {
  const body = this.nextElementSibling;
  const toggle = this.querySelector(".page-info-toggle");
  const isHidden = getComputedStyle(body).display === "none";
  body.style.display = isHidden ? "block" : "none";
  toggle.textContent = isHidden ? "−" : "+";
});

fetch("../data/graph.json")
  .then(r => r.json())
  .then(data => {
    adjacency = data.adjacency;
    allWords  = Object.keys(adjacency).sort();
  });

function findPath(start, end) {
  if (!adjacency[start] || !adjacency[end]) return null;
  if (start === end) return [{ word: start, type: null }];
  const queue   = [[{ word: start, type: null }]];
  const visited = new Set([start]);
  let checked   = 0;
  while (queue.length) {
    const path = queue.shift();
    const cur  = path[path.length - 1].word;
    for (const { word: nb, type } of (adjacency[cur] || [])) {
      if (nb === end) return [...path, { word: nb, type }];
      if (!visited.has(nb)) {
        visited.add(nb);
        if (path.length < 10) queue.push([...path, { word: nb, type }]);
        if (++checked > 20000) return null;
      }
    }
  }
  return null;
}

const REL_COLORS = {
  "sarnane": "#4a9eff", "antonüüm": "#ff4466", "vastand": "#ff7733",
  "ülemmõiste": "#cc88ff", "alammõiste": "#33ddbb", "kaashüponüüm": "#55bbff",
  "seotud mõiste": "#77dd77", "soomõiste": "#bb66ff", "liigimõiste": "#44ccee",
  "tervikumõiste": "#ffcc44", "osamõiste": "#ffaa22",
};

function showPath(path) {
  document.getElementById("chain-wrap").style.display = "";
  const chain = document.getElementById("chain");
  const lenEl = document.getElementById("path-len");
  chain.innerHTML = "";
  const steps = path.length - 1;

  path.forEach((item, i) => {
    if (i > 0) {
      const color = REL_COLORS[item.type] || "var(--border)";
      const delay = `${(i - 1) * 80 + 40}ms`;
      const conn = document.createElement("div");
      conn.className = "chain-connector";
      conn.style.animationDelay = delay;
      conn.innerHTML = `
        <span class="conn-label" style="color:${color};background:${color}18">${item.type || ""}</span>
        <div class="conn-line" style="background:${color};"></div>`;
      conn.querySelector(".conn-line").style.setProperty("--arrow-color", color);
      // inline arrowhead color via filter not easy — use inline style on ::after via a wrapper
      chain.appendChild(conn);
    }

    const node = document.createElement("div");
    node.className = "chain-node" + (i === 0 ? " start" : i === path.length - 1 ? " end" : "");
    node.innerHTML = `<a href="https://sonaveeb.ee/search/unif/dlall/dsall/${encodeURIComponent(item.word)}/1/est" target="_blank" rel="noopener" class="node-link">${item.word}</a>`;
    node.style.animationDelay = `${i * 80}ms`;
    chain.appendChild(node);
  });

  lenEl.textContent = steps === 0 ? "" : steps === 1 ? "otsene seos" : `${steps} sammu`;
}

function setMsg(txt) {
  document.getElementById("msg").textContent = txt;
  document.getElementById("chain").innerHTML = "";
  document.getElementById("path-len").textContent = "";
  document.getElementById("chain-wrap").style.display = "none";
}

document.getElementById("btn-find").addEventListener("click", () => {
  const a = document.getElementById("w1").value.trim();
  const b = document.getElementById("w2").value.trim();
  if (!a || !b) { setMsg("Mõlemad sõnad peavad olema täidetud."); return; }
  if (!adjacency[a]) { setMsg(`„${a}" ei leidu seoste andmestikus.`); return; }
  if (!adjacency[b]) { setMsg(`„${b}" ei leidu seoste andmestikus.`); return; }
  setMsg("Otsin…");
  setTimeout(() => {
    const path = findPath(a, b);
    if (!path) {
      setMsg(`Teed „${a}" → „${b}" ei leitud — liiga kaugel või ühendus puudub.`);
    } else {
      document.getElementById("msg").textContent = "";
      showPath(path);
    }
  }, 30);
});

document.getElementById("btn-random").addEventListener("click", () => {
  if (!allWords.length) return;
  const pick = () => allWords[Math.floor(Math.random() * allWords.length)];
  document.getElementById("w1").value = pick();
  document.getElementById("w2").value = pick();
  document.getElementById("btn-find").click();
});

document.getElementById("btn-swap").addEventListener("click", () => {
  const w1 = document.getElementById("w1");
  const w2 = document.getElementById("w2");
  [w1.value, w2.value] = [w2.value, w1.value];
});

function setupAutocomplete(inputId, sugId) {
  const inp = document.getElementById(inputId);
  const sug = document.getElementById(sugId);
  let list = [], activeIdx = -1;
  inp.addEventListener("input", () => {
    const q = inp.value.trim().toLowerCase();
    sug.innerHTML = "";
    if (!q) { sug.style.display = "none"; return; }
    list = allWords.filter(w => w.toLowerCase().startsWith(q)).slice(0, 7);
    if (!list.length) { sug.style.display = "none"; return; }
    activeIdx = -1;
    list.forEach(w => {
      const d = document.createElement("div");
      d.className = "sug-item"; d.textContent = w;
      d.addEventListener("click", () => { inp.value = w; sug.style.display = "none"; });
      sug.appendChild(d);
    });
    sug.style.display = "block";
  });
  inp.addEventListener("keydown", e => {
    const items = sug.querySelectorAll(".sug-item");
    if (e.key === "ArrowDown") { e.preventDefault(); activeIdx = Math.min(activeIdx + 1, list.length - 1); }
    else if (e.key === "ArrowUp") { e.preventDefault(); activeIdx = Math.max(activeIdx - 1, 0); }
    else if (e.key === "Enter") {
      if (activeIdx >= 0) { inp.value = list[activeIdx]; sug.style.display = "none"; return; }
      sug.style.display = "none";
      document.getElementById("btn-find").click();
      return;
    } else if (e.key === "Escape") { sug.style.display = "none"; return; }
    items.forEach((el, i) => el.classList.toggle("active", i === activeIdx));
  });
  document.addEventListener("click", e => {
    if (!inp.contains(e.target) && !sug.contains(e.target)) sug.style.display = "none";
  });
}

setupAutocomplete("w1", "s1");
setupAutocomplete("w2", "s2");

document.getElementById("w1").addEventListener("keydown", e => {
  if (e.key === "Tab") { e.preventDefault(); document.getElementById("w2").focus(); }
});
</script>

<script src="../js/nav-config.js"></script>
<script src="../js/nav-render.js"></script>
</body>
</html>
