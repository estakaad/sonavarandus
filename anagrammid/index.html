<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Sõnavarandus - Anagrammipaarid</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #body { display: flex; flex: 1; overflow: hidden; background: var(--bg); }
  #list-wrap { flex: 1; overflow-y: auto; padding: 16px 24px 40px; }

  .length-section { margin-bottom: 28px; }

  .length-heading {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 10px;
  }
  .length-title { font-size: 20px; font-weight: 300; color: var(--text); letter-spacing: 1px; }
  .length-meta  { font-size: 12px; color: var(--text-muted); }

  .groups-flow { display: flex; flex-wrap: wrap; gap: 6px; }

  .group-chip {
    display: inline-flex; align-items: center; gap: 0;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 2px; transition: background .1s, border-color .1s;
  }
  .group-chip:hover { background: var(--accent-light); border-color: var(--accent); }

  .chip-word {
    font-size: 13px; color: var(--text-sec);
    padding: 0 8px; border-radius: 4px;
    transition: color .1s, background .1s; cursor: default;
  }
  .chip-word.match { color: var(--accent); font-weight: 600; }

  .chip-sep {
    font-size: 11px; color: var(--text-ghost);
    user-select: none; flex-shrink: 0;
  }
</style>
</head>
<body>

<a class="skip-link" href="#body">Hüppa põhisisu juurde</a>

<div class="app-header">
  <a class="nav-brand" href="../index.html">Sõnavarandus</a>
  <div id="top-nav-mount"></div>
  <div class="header-end">
    <span class="page-title">Anagrammipaarid</span>
    <span id="info" class="header-info"></span>
    <input id="search" class="text-input" type="text" placeholder="Otsi sõna…"
           style="width:180px" autocomplete="off" spellcheck="false">
  </div>
</div>

<div id="body">
  <div id="list-wrap">
    <div id="list"></div>
  </div>
</div>

<script src="../js/utils.js"></script>
<script>
let allGroups = [];

// Rühmita pikkuse järgi: { length -> [group, ...] }
function byLength(groups) {
  const map = new Map();
  groups.forEach(g => {
    if (!map.has(g.length)) map.set(g.length, []);
    map.get(g.length).push(g);
  });
  return new Map([...map.entries()].sort((a, b) => b[0] - a[0]));
}

function buildChip(g, q) {
  const chip = document.createElement("span");
  chip.className = "group-chip";
  g.words.forEach((w, i) => {
    if (i > 0) {
      const sep = document.createElement("span");
      sep.className = "chip-sep";
      sep.textContent = "=";
      chip.appendChild(sep);
    }
    const word = wordLink(w, "chip-word" + (q && w.includes(q) ? " match" : ""));
    chip.appendChild(word);
  });
  return chip;
}

function render(q) {
  const filtered = q
    ? allGroups.filter(g => g.words.some(w => w.includes(q)))
    : allGroups;

  const list = document.getElementById("list");
  list.innerHTML = "";

  byLength(filtered).forEach((groups, length) => {
    const section = document.createElement("div");
    section.className = "length-section";

    const heading = document.createElement("div");
    heading.className = "length-heading";
    heading.innerHTML = `
      <span class="length-title">${length}-tähelised</span>
      <span class="length-meta">${groups.length} gruppi</span>`;
    section.appendChild(heading);

    const flow = document.createElement("div");
    flow.className = "groups-flow";
    groups.forEach(g => flow.appendChild(buildChip(g, q)));
    section.appendChild(flow);

    list.appendChild(section);
  });

  document.getElementById("info").textContent =
    q ? `${filtered.length} gruppi` : `${allGroups.length} gruppi`;
  document.getElementById("list-wrap").scrollTop = 0;
}

document.getElementById("search").addEventListener("input", function() {
  render(this.value.trim().toLowerCase());
});

fetch("../data/anagrams.json")
  .then(r => r.json())
  .then(data => {
    allGroups = data.groups;
    render("");
  })
  .catch(() => {
    document.getElementById("list").textContent =
      "⚠ anagrams.json puudub — käivita prepare_data.py";
  });
</script>

<footer class="app-footer">
  <a class="footer-link" href="../info.html">Info</a>
  <span class="footer-sep" aria-hidden="true">·</span>
  <a class="footer-link" href="../kontakt.html">Kontakt</a>
</footer>

<script src="../js/nav-config.js"></script>
<script src="../js/nav-render.js"></script>
</body>
</html>
