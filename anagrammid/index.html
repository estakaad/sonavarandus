<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sõnavarandus - Anagrammipaarid</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #body { display: flex; flex: 1; overflow: hidden; background: var(--bg); }
  #list-wrap { flex: 1; overflow-y: auto; padding: 16px 24px 40px; }

  .length-section { margin-bottom: 28px; }

  .length-heading {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 10px;
  }
  .length-title { font-size: 20px; font-weight: 300; color: var(--text); letter-spacing: 1px; }
  .length-meta  { font-size: 12px; color: var(--text-muted); }

  .groups-flow { display: flex; flex-wrap: wrap; gap: 6px; }

  .group-chip {
    display: inline-flex; align-items: center; gap: 0;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 2px; transition: background .1s, border-color .1s;
  }
  .group-chip:hover { background: var(--accent-light); border-color: var(--accent); }

  .chip-word {
    font-size: 13px; color: var(--text-sec);
    padding: 0 8px; border-radius: 4px;
    transition: color .1s, background .1s; cursor: default;
  }
  .chip-word.match { color: var(--accent); font-weight: 600; }

  .chip-sep {
    font-size: 11px; color: var(--text-ghost);
    user-select: none; flex-shrink: 0;
  }

  #pager {
    display: none; align-items: center; justify-content: center;
    gap: 8px; padding: 16px 0 8px; flex-wrap: wrap;
  }
  #pg-numbers { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .pg-btn {
    width: 36px; height: 36px; padding: 0; border: 1px solid var(--border);
    border-radius: 50%; background: var(--bg); color: var(--text-sec);
    font-size: 12px; cursor: pointer; transition: all .1s; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .pg-btn:hover:not(:disabled) { background: var(--surface-alt); border-color: var(--accent); }
  .pg-btn.current { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<a class="skip-link" href="#body">Hüppa põhisisu juurde</a>

<div class="app-header">
  <a class="nav-brand" href="../index.html">Sõnavarandus</a>
  <div id="top-nav-mount"></div>
</div>

<div id="body">
  <div id="list-wrap">
    <div class="page-info-accordion">
      <div class="page-info-header">
        <span class="page-info-icon">ℹ</span>
        <span class="page-info-title">Anagrammipaarid</span>
        <span class="page-info-toggle">−</span>
      </div>
      <div class="page-info-body">
        <p class="page-info-desc">Samad tähed, eri sõnad.</p>
      </div>
    </div>
    <div id="list"></div>
    <div id="pager">
      <button type="button" class="btn btn-sm" id="pg-prev">← Eelmine</button>
      <div id="pg-numbers"></div>
      <button type="button" class="btn btn-sm" id="pg-next">Järgmine →</button>
    </div>
  </div>
</div>

<script src="../js/utils.js"></script>
<script>
const PAGE_SIZE = 100;
let allGroups = [], currentGroups = [], currentPage = 1;

// Accordion toggle
document.querySelector(".page-info-header").addEventListener("click", function() {
  const body = this.nextElementSibling;
  const toggle = this.querySelector(".page-info-toggle");
  body.style.display = getComputedStyle(body).display === "none" ? "block" : "none";
  toggle.textContent = getComputedStyle(body).display === "none" ? "+" : "−";
});

function buildChip(g, q) {
  const chip = document.createElement("span");
  chip.className = "group-chip";
  g.words.forEach((w, i) => {
    if (i > 0) {
      const sep = document.createElement("span");
      sep.className = "chip-sep";
      sep.textContent = "=";
      chip.appendChild(sep);
    }
    const word = wordLink(w, "chip-word" + (q && w.includes(q) ? " match" : ""));
    chip.appendChild(word);
  });
  return chip;
}

function renderPage() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  const q = "";
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageGroups = currentGroups.slice(start, start + PAGE_SIZE);

  // Rühmita lehel olevad grupid pikkuse järgi
  const byLen = new Map();
  pageGroups.forEach(g => {
    if (!byLen.has(g.length)) byLen.set(g.length, []);
    byLen.get(g.length).push(g);
  });
  new Map([...byLen.entries()].sort((a, b) => b[0] - a[0])).forEach((groups, length) => {
    const section = document.createElement("div");
    section.className = "length-section";
    const heading = document.createElement("div");
    heading.className = "length-heading";
    heading.innerHTML = `
      <span class="length-title">${length}-tähelised</span>
      <span class="length-meta">${groups.length} gruppi</span>`;
    section.appendChild(heading);
    const flow = document.createElement("div");
    flow.className = "groups-flow";
    groups.forEach(g => flow.appendChild(buildChip(g, q)));
    section.appendChild(flow);
    list.appendChild(section);
  });

  document.getElementById("list-wrap").scrollTop = 0;
  renderPager();
}

function renderPager() {
  const totalPages = Math.ceil(currentGroups.length / PAGE_SIZE);
  const pager = document.getElementById("pager");
  pager.style.display = totalPages > 1 ? "flex" : "none";
  const numbersDiv = document.getElementById("pg-numbers");
  numbersDiv.innerHTML = "";

  const range = 5;
  let start = Math.max(1, currentPage - Math.floor(range / 2));
  let end = Math.min(totalPages, start + range - 1);
  if (end - start < range - 1) start = Math.max(1, end - range + 1);

  if (start > 1) {
    const b = document.createElement("button"); b.className = "pg-btn"; b.textContent = "1";
    b.onclick = () => { currentPage = 1; renderPage(); }; numbersDiv.appendChild(b);
    if (start > 2) { const d = document.createElement("span"); d.textContent = "…"; d.style.opacity = "0.5"; numbersDiv.appendChild(d); }
  }
  for (let i = start; i <= end; i++) {
    const b = document.createElement("button");
    b.className = `pg-btn ${i === currentPage ? "current" : ""}`; b.textContent = i;
    b.onclick = () => { currentPage = i; renderPage(); }; numbersDiv.appendChild(b);
  }
  if (end < totalPages) {
    if (end < totalPages - 1) { const d = document.createElement("span"); d.textContent = "…"; d.style.opacity = "0.5"; numbersDiv.appendChild(d); }
    const b = document.createElement("button"); b.className = "pg-btn"; b.textContent = totalPages;
    b.onclick = () => { currentPage = totalPages; renderPage(); }; numbersDiv.appendChild(b);
  }
  document.getElementById("pg-prev").disabled = currentPage <= 1;
  document.getElementById("pg-next").disabled = currentPage >= totalPages;
}

document.getElementById("pg-prev").addEventListener("click", () => {
  if (currentPage > 1) { currentPage--; renderPage(); }
});
document.getElementById("pg-next").addEventListener("click", () => {
  if (currentPage < Math.ceil(currentGroups.length / PAGE_SIZE)) { currentPage++; renderPage(); }
});

fetch("../data/anagrams.json")
  .then(r => r.json())
  .then(data => {
    allGroups = data.groups;
    currentGroups = allGroups;
    renderPage();
  })
  .catch(() => {
    document.getElementById("list").textContent =
      "⚠ anagrams.json puudub — käivita prepare_data.py";
  });
</script>


<script src="../js/nav-config.js"></script>
<script src="../js/nav-render.js"></script>
</body>
</html>
