name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout private data repo
        uses: actions/checkout@v4
        with:
          repository: estakaad/sonavarandus-data
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: data

      - name: Run prepare_data.py scripts
        run: |
          for dir in */; do
            if [ -f "$dir/prepare_data.py" ]; then
              echo "Running $dir/prepare_data.py"
              (cd "$dir" && python prepare_data.py) || echo "WARNING: $dir/prepare_data.py failed"
            fi
          done
          echo "Generated JSON files:"
          ls data/*.json 2>/dev/null || echo "No JSON files found!"

      - name: Disable Jekyll
        run: touch .nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
