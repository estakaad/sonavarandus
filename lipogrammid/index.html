<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Lipogrammid</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #body { display: flex; flex: 1; overflow: hidden; background: var(--bg); }
  #list-wrap { flex: 1; overflow-y: auto; padding: 16px 24px 40px; }

  .tab-bar { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab {
    padding: 6px 18px; border-radius: 20px; font-size: 13px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text-muted); cursor: pointer; transition: all .15s;
  }
  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .length-group { margin-bottom: 20px; }
  .length-heading { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
  .length-badge { font-size: 16px; font-weight: 300; color: var(--text); }
  .length-count { font-size: 12px; color: var(--text-muted); }
  .word-pill {
    display: inline-block; margin: 3px 4px 3px 0;
    padding: 4px 12px; border-radius: 20px; font-size: 13px;
    background: var(--surface-alt); color: var(--text-sec);
    transition: background .1s, color .1s;
  }
  .word-pill:hover { background: var(--accent-light); color: var(--accent); }
  .word-pill.dim { opacity: 0.25; }
</style>
</head>
<body>
<a class="skip-link" href="#body">Hüppa põhisisu juurde</a>
<div class="app-header">
  <nav class="breadcrumb" aria-label="Navigatsioon">
    <a class="breadcrumb-home" href="../index.html">Keele peal</a>
    <span class="breadcrumb-sep" aria-hidden="true">›</span>
    <span class="breadcrumb-current">Lipogrammid</span>
  </nav>
  <div class="header-end">
    <span id="info" class="header-info"></span>
    <input id="search" class="text-input" type="text" placeholder="Otsi…"
           style="width:160px" autocomplete="off" spellcheck="false">
  </div>
</div>
<div id="body">
  <div id="list-wrap">
    <div id="tab-bar" class="tab-bar"></div>
    <div id="list"></div>
  </div>
</div>
<script>
let allCategories = [], activeIdx = 0;

function renderCategory(idx, q) {
  activeIdx = idx;
  const cat = allCategories[idx];
  const list = document.getElementById("list");
  list.innerHTML = "";
  let totalVisible = 0;

  cat.groups.forEach(g => {
    const matched = q ? g.words.filter(w => w.includes(q)) : g.words;
    if (!matched.length && q) return;
    totalVisible += matched.length;
    const sec = document.createElement("div");
    sec.className = "length-group";
    sec.innerHTML = `<div class="length-heading">
      <span class="length-badge">${g.length}-tähelised</span>
      <span class="length-count">${matched.length}</span></div>`;
    const pills = document.createElement("div");
    g.words.forEach(w => {
      const pill = document.createElement("span");
      pill.className = "word-pill" + (q && !matched.includes(w) ? " dim" : "");
      pill.textContent = w;
      pills.appendChild(pill);
    });
    sec.appendChild(pills);
    list.appendChild(sec);
  });

  document.getElementById("info").textContent =
    q ? `${totalVisible} vastet` : `${cat.total} sõna`;
  document.getElementById("list-wrap").scrollTop = 0;

  document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", i === idx));
}

document.getElementById("search").addEventListener("input", function() {
  renderCategory(activeIdx, this.value.trim().toLowerCase());
});

fetch("data/lipograms.json").then(r=>r.json()).then(data => {
  allCategories = data.categories;
  const bar = document.getElementById("tab-bar");
  allCategories.forEach((cat, i) => {
    const tab = document.createElement("button");
    tab.type = "button";
    tab.className = "tab" + (i === 0 ? " active" : "");
    tab.textContent = `ilma '${cat.letter}'-ta`;
    tab.addEventListener("click", () => {
      document.getElementById("search").value = "";
      renderCategory(i, "");
    });
    bar.appendChild(tab);
  });
  renderCategory(0, "");
}).catch(() => { document.getElementById("list").textContent = "⚠ lipograms.json puudub — käivita prepare_data.py"; });
</script>
</body>
</html>
