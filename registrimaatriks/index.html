<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sõnavarandus - Registrimaatriks</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #body { display: flex; flex: 1; overflow: hidden; background: var(--bg); }
  #matrix-wrap { flex: 1; overflow: auto; padding: 24px; display: flex; flex-direction: column; }
  #matrix-svg { flex: 1; }
  .cell { cursor: pointer; transition: opacity .1s; }
  .cell:hover { opacity: 0.75; }
  .cell.selected { stroke: var(--text); stroke-width: 2; }
  #panel.open { width: 420px; }
  #panel-inner { width: 420px; overflow-y: hidden; display: flex; flex-direction: column; height: 100%; }
  #p-meta { flex-shrink: 0; }
  #p-regs  { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
  #p-count { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
  #p-words { flex: 1; overflow-y: auto; margin-bottom: 12px; }
  .w-item { display: inline-block; margin: 3px 4px 3px 0; padding: 3px 10px; border-radius: 20px; background: var(--surface-alt); color: var(--text-sec); font-size: 12px; }
  .w-item.diagonal { background: var(--accent-light); color: var(--accent); }
  #p-pagination { flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 16px; font-size: 12px; color: var(--text-muted); flex-wrap: nowrap; }
  .pg-nums { display: flex; align-items: center; gap: 8px; }
  #p-pagination button.pg-nav { padding: 4px 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text-sec); border-radius: 4px; cursor: pointer; font-size: 11px; flex-shrink: 0; }
  #p-pagination button.pg-nav:hover { background: var(--surface-alt); border-color: var(--accent); }
  #p-pagination button.pg-nav:disabled { opacity: 0.3; cursor: not-allowed; }
  #p-pagination button.pg-num { width: 36px; height: 36px; padding: 0; border: 1px solid var(--border); border-radius: 50%; background: var(--bg); color: var(--text-sec); font-size: 11px; cursor: pointer; transition: all .1s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  #p-pagination button.pg-num:hover { background: var(--surface-alt); border-color: var(--accent); }
  #p-pagination button.pg-num.current { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .sep { height: 1px; background: var(--surface-alt); margin: 14px 0; }
  .p-label { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }

  /* ── Mobiili nimekirjavaade ── */
  #mobile-list { display: none; }
  .pair-row {
    display: flex; align-items: center; gap: 12px;
    padding: 7px 8px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background .1s;
  }
  .pair-row:hover    { background: var(--row-hover); }
  .pair-row.selected { background: var(--row-selected); }
  .pair-regs { flex: 1; min-width: 0; font-size: 13px; color: var(--text-sec);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pair-regs.diag { color: var(--text); font-weight: 600; }
  .pair-count {
    flex-shrink: 0; width: 44px; text-align: right; padding-right: 8px;
    font-size: 13px; font-weight: 600; color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  @media (max-width: 640px) {
    body { height: auto; overflow-x: clip; overflow-y: auto; }
    #body { flex: none; width: 100%; flex-direction: column; }
    #matrix-wrap { overflow: hidden; flex: none; width: 100%; box-sizing: border-box; padding: 12px 16px 24px; }
    #matrix-svg { display: none; }
    #mobile-list { display: block; }

    /* Paneel pagineerimine — lehenumbrid üles, nooled alla */
    #p-pagination { flex-wrap: wrap !important; gap: 8px !important; }
    .pg-nums { order: -1; flex: 0 0 100%; gap: 4px !important; flex-wrap: wrap !important; justify-content: center; }
    .pg-num { width: 32px !important; height: 32px !important; font-size: 11px !important; }
  }
</style>
</head>
<body>

<div class="app-header">
  <a class="nav-brand" href="../index.html">Sõnavarandus</a>
  <div id="top-nav-mount"></div>
</div>

<div id="body">
  <div id="matrix-wrap">
    <div class="page-info-accordion">
      <div class="page-info-header">
        <span class="page-info-icon">ℹ</span>
        <span class="page-info-title">Registrimaatriks</span>
        <span class="page-info-toggle">−</span>
      </div>
      <div class="page-info-body">
        <p class="page-info-desc">Mõnda sõna kasutatakse põhiliselt kõnekeelsetes olukordades, mõnda sõna lastekeeles jne. Mõne sõna kohta on sõnaraamatus märgitud kaks registrit korraga. Siit maatriksist leiab need võimalikud kombinatsioonid.</p>
      </div>
    </div>
    <div id="mobile-list"></div>
    <svg id="matrix-svg"></svg>
  </div>

  <div id="panel" class="side-panel">
    <div id="panel-inner" class="side-panel__inner">
      <div id="p-regs"></div>
      <div id="p-count"></div>
      <div class="sep"></div>
      <div class="p-label">Näitesõnad</div>
      <div id="p-words"></div>
      <div id="p-pagination"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
// Accordion toggle
document.querySelector(".page-info-header").addEventListener("click", function() {
  const body = this.nextElementSibling;
  const toggle = this.querySelector(".page-info-toggle");
  const isHidden = getComputedStyle(body).display === "none";
  body.style.display = isHidden ? "block" : "none";
  toggle.textContent = isHidden ? "−" : "+";
});

fetch("../data/registers.json")
  .then(r => r.json())
  .then(data => { if (window.innerWidth > 640) draw(data); renderMobileList(data); })
  .catch(() => {
    document.getElementById("matrix-wrap").innerHTML =
      '<p style="padding:40px;color:#94a3b8">⚠ registers.json puudub — käivita prepare_data.py</p>';
  });

const REG_NAMES = {
  hrv:    "harv",
  van:    "vananenud/vananemas",
  vulg:   "vulgaarne",
  lastek: "lastekeelne",
  hlv:    "halvustav",
  kõnek:  "kõnekeelne, vabakeelne",
  murd:   "murdekeelne",
  rhv:    "rahvapärane, rahvakeeles",
  luulek: "luulekeelne",
  piib:   "Piiblis",
  sti:    "stiilitundlik",
  eevn:   "eestivene",
  unar:   "unarsõna",
  inglAm: "Ameerika inglise",
  inglBr: "Briti inglise",
  koh:    "kohalik",
  madalk: "madalkeelne",
  mta:    "mitteametlik",
  nlj:    "naljatlev",
  släng:  "släng",
  teg:    "tegelik, de facto",
  hellitl:"hellitlev",
  liter:  "kirjanduslik",
  am:     "ametlik",
  kõrgst: "kõrgstiil",
  ettep:  "sõnaettepanek",
  Venemaal:"Venemaal",
  uus:    "uus",
  aja:    "ajalooline",
  slg:    "erialasläng",
  üldk:   "üldkeelne",
};

function label(code) { return REG_NAMES[code] || code; }

function draw(data) {
  const regs   = data.registers;   // [{code, total}]
  const matrix = data.matrix;
  const pairs  = data.pairs;
  const codes  = regs.map(r => r.code);
  const n      = codes.length;

  // Calculate total entries (unique lexemes)
  const totalEntries = regs.reduce((s, r) => s + r.total, 0);

  // ── mõõtmed ──────────────────────────────────────────────
  const CELL = 36;
  const LABEL_W = 240;   // vasak silt (pikem nimetuste jaoks)
  const LABEL_H = 100;   // ülemine silt (roteeritud nimetused)
  const W = LABEL_W + n * CELL + 2;
  const H = LABEL_H + n * CELL + 2;

  const svg = d3.select("#matrix-svg")
    .attr("width", W).attr("height", H);

  // ── värviskeem ────────────────────────────────────────────
  const maxCooc = d3.max(codes, r1 =>
    d3.max(codes.filter(r2 => r1 !== r2), r2 => matrix[r1]?.[r2] || 0)
  ) || 1;
  const maxDiag = d3.max(regs, r => r.total) || 1;

  const colorCooc = d3.scaleSequential(d3.interpolateBlues).domain([0, maxCooc]);
  const colorDiag = d3.scaleSequential(d3.interpolateGreys).domain([0, maxDiag * 1.2]);

  // ── lahtrid ───────────────────────────────────────────────
  let selected = null;

  codes.forEach((r1, i) => {
    codes.forEach((r2, j) => {
      const isDiag = r1 === r2;
      const key    = `${[r1,r2].sort().join("|")}`;
      const val    = matrix[r1]?.[r2] || 0;
      const color  = isDiag ? colorDiag(val) : (val > 0 ? colorCooc(val) : "#f8fafc");

      const cell = svg.append("rect")
        .attr("class", "cell")
        .attr("x", LABEL_W + j * CELL)
        .attr("y", LABEL_H + i * CELL)
        .attr("width", CELL - 1).attr("height", CELL - 1)
        .attr("rx", 2)
        .attr("fill", color)
        .on("click", () => {
          if (selected) selected.classed("selected", false);
          cell.classed("selected", true);
          selected = cell;
          openPanel(r1, r2, val, pairs[key] || []);
        });

      // arv lahtris (ainult kui mahtub)
      if (val > 0 && CELL >= 18) {
        svg.append("text")
          .attr("x", LABEL_W + j * CELL + CELL/2 - 0.5)
          .attr("y", LABEL_H + i * CELL + CELL/2 + 4)
          .attr("text-anchor", "middle")
          .attr("font-size", val >= 1000 ? 10 : val >= 100 ? 11 : 12)
          .attr("fill", val > maxCooc * 0.5 || (isDiag && val > maxDiag * 0.5) ? "#fff" : "#475569")
          .style("pointer-events", "none")
          .text(val > 0 ? (val >= 1000 ? Math.round(val/1000)+"k" : val) : "");
      }
    });
  });

  // ── vasak siltide rida ────────────────────────────────────
  codes.forEach((r, i) => {
    svg.append("text")
      .attr("x", LABEL_W - 6)
      .attr("y", LABEL_H + i * CELL + CELL/2 + 4)
      .attr("text-anchor", "end")
      .attr("font-size", 11)
      .attr("fill", "#334155")
      .text(label(r));
  });

  // ── ülemised sildid (roteeritud) ──────────────────────────
  codes.forEach((r, j) => {
    svg.append("text")
      .attr("transform", `translate(${LABEL_W + j * CELL + CELL/2}, ${LABEL_H - 6}) rotate(-45)`)
      .attr("text-anchor", "start")
      .attr("font-size", 11)
      .attr("fill", "#334155")
      .text(label(r));
  });

  // ── legend ────────────────────────────────────────────────
  const legY = H - 0;  // all nurgas polegi legendi, piisab vihjest
}

// ── Mobiili nimekirjavaade ────────────────────────────────────
function renderMobileList(data) {
  const { registers, matrix, pairs } = data;
  const codes = registers.map(r => r.code);
  const rows = [];

  registers.forEach(r => {
    if (r.total > 0) rows.push({ r1: r.code, r2: r.code, count: r.total, diag: true });
  });
  codes.forEach((r1, i) => {
    codes.slice(i + 1).forEach(r2 => {
      const val = matrix[r1]?.[r2] || 0;
      if (val > 0) rows.push({ r1, r2, count: val, diag: false });
    });
  });
  rows.sort((a, b) => b.count - a.count);

  const list = document.getElementById("mobile-list");
  list.innerHTML = rows.map((row, idx) => {
    const text = row.diag ? label(row.r1) : `${label(row.r1)} × ${label(row.r2)}`;
    return `<div class="pair-row" data-idx="${idx}">
      <span class="pair-regs${row.diag ? ' diag' : ''}">${text}</span>
      <span class="pair-count">${row.count}</span>
    </div>`;
  }).join('');

  list._rows = rows;
  list._pairs = pairs;

  list.addEventListener('click', e => {
    const el = e.target.closest('.pair-row');
    if (!el) return;
    list.querySelectorAll('.pair-row.selected').forEach(r => r.classList.remove('selected'));
    el.classList.add('selected');
    const { r1, r2, count } = list._rows[+el.dataset.idx];
    const key = [r1, r2].sort().join('|');
    openPanel(r1, r2, count, list._pairs[key] || []);
  });
}

// ── paneel ────────────────────────────────────────────────────
const PAGE_SIZE = 100;
let currentWords = [];
let currentDiag = false;
let currentPage = 1;

function renderWordsPage(page) {
  const start = (page - 1) * PAGE_SIZE;
  const end = start + PAGE_SIZE;
  const pageWords = currentWords.slice(start, end);

  document.getElementById("p-words").innerHTML = pageWords.length
    ? pageWords.map(w => `<a class="w-item${currentDiag ? " diagonal" : ""}" href="https://sonaveeb.ee/search/unif/dlall/dsall/${encodeURIComponent(w)}/1/est" target="_blank" rel="noopener">${w}</a>`).join("")
    : '<span style="color:#94a3b8;font-size:12px">näitesõnad puuduvad</span>';

  // Pagination buttons
  const totalPages = Math.ceil(currentWords.length / PAGE_SIZE);
  const paginationDiv = document.getElementById("p-pagination");

  if (totalPages > 1) {
    const html = ['<button class="pg-nav" onclick="renderWordsPage(currentPage - 1)" ' + (page === 1 ? 'disabled' : '') + '>← Eelmine</button>', '<div class="pg-nums">'];

    const range = 5;
    let pageStart = Math.max(1, page - Math.floor(range / 2));
    let pageEnd = Math.min(totalPages, pageStart + range - 1);
    if (pageEnd - pageStart < range - 1) pageStart = Math.max(1, pageEnd - range + 1);

    // Always show page 1
    if (pageStart > 1) {
      html.push('<button class="pg-num" onclick="renderWordsPage(1)">1</button>');
      if (pageStart > 2) {
        html.push('<span style="opacity:0.5">…</span>');
      }
    }

    for (let i = pageStart; i <= pageEnd; i++) {
      html.push(`<button class="pg-num${i === page ? ' current' : ''}" onclick="renderWordsPage(${i})">${i}</button>`);
    }

    // Always show last page
    if (pageEnd < totalPages) {
      if (pageEnd < totalPages - 1) {
        html.push('<span style="opacity:0.5">…</span>');
      }
      html.push(`<button class="pg-num" onclick="renderWordsPage(${totalPages})">${totalPages}</button>`);
    }

    html.push('</div>', '<button class="pg-nav" onclick="renderWordsPage(currentPage + 1)" ' + (page === totalPages ? 'disabled' : '') + '>Järgmine →</button>');
    paginationDiv.innerHTML = html.join('');
  } else {
    paginationDiv.innerHTML = '';
  }

  currentPage = page;
}

function openPanel(r1, r2, count, words) {
  const isDiag = r1 === r2;
  document.getElementById("p-regs").textContent = isDiag ? label(r1) : `${label(r1)} × ${label(r2)}`;
  document.getElementById("p-count").textContent =
    isDiag ? `${count} lekseemi selle registriga` : `${count} lekseemi mõlema registriga`;

  currentWords = words;
  currentDiag = isDiag;
  currentPage = 1;
  document.getElementById("panel").classList.add("open");
  renderWordsPage(1);

}
</script>


<script src="../js/nav-config.js"></script>
<script src="../js/nav-render.js"></script>
</body>
</html>
