<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Sõnavarandus - Scrabble'i punktid</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #body { display: flex; flex: 1; overflow: hidden; background: var(--bg); }
  #list-wrap { flex: 1; overflow-y: auto; padding: 16px 24px 40px; }

  /* ── realiit ── */
  .row {
    display: flex; align-items: center; gap: 12px;
    padding: 5px 8px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background .12s;
  }
  .row:hover    { background: var(--row-hover); }
  .row.selected { background: var(--row-selected); }

  .rank  { width: 32px; flex-shrink: 0; font-size: 11px; color: var(--text-ghost);
           text-align: right; font-variant-numeric: tabular-nums; }
  .word  { width: 180px; flex-shrink: 0; font-size: 14px; color: var(--text); }
  .bar-wrap { flex: 1; height: 10px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar  { height: 100%; border-radius: 3px; background: var(--accent); transition: width .3s; }
  .pts  { width: 36px; flex-shrink: 0; text-align: right;
          font-size: 13px; font-weight: 600; color: var(--accent);
          font-variant-numeric: tabular-nums; }

  /* ── paneel ── */
  #p-word  { font-size: 28px; font-weight: 300; letter-spacing: 2px; color: var(--text); margin-bottom: 4px; }
  #p-score { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

  .letter-row {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px;
  }
  .letter-tile {
    display: flex; flex-direction: column; align-items: center;
    width: 38px; background: var(--surface-alt);
    border-radius: 6px; padding: 6px 4px 4px;
  }
  .tile-ch  { font-size: 18px; font-weight: 600; color: var(--text); line-height: 1; }
  .tile-pts { font-size: 10px; color: var(--accent); margin-top: 3px; font-weight: 600; }

  /* ── info accordion ── */
  .page-info-accordion {
    margin-bottom: 24px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden;
  }
  .page-info-header {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    cursor: pointer; user-select: none; transition: background .15s;
  }
  .page-info-header:hover { background: var(--surface-alt); }
  .page-info-icon { font-size: 14px; color: var(--accent); font-weight: 700; }
  .page-info-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
  .page-info-toggle { font-size: 18px; color: var(--text-muted); font-weight: 300; }

  .page-info-body {
    padding: 0 16px 12px; border-top: 1px solid var(--border);
    display: none;
  }
  .page-info-body.open { display: block; }
  .page-info-desc { font-size: 13px; color: var(--text-sec); line-height: 1.5; margin-bottom: 12px; }
  .page-info-stats { display: flex; flex-wrap: wrap; gap: 20px; }
  .stat-row { display: flex; gap: 8px; }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 12px; color: var(--text); font-weight: 600; }

  /* ── reeglid ── */
  #rules-toggle {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-muted); letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer; user-select: none;
    margin-bottom: 10px;
  }
  #rules-toggle:hover { color: var(--text-sec); }
  #rules-arrow { font-size: 10px; transition: transform .2s; }
  #rules-arrow.open { transform: rotate(90deg); }

  #rules-body { display: none; }
  #rules-body.open { display: block; }

  .score-table { border-collapse: collapse; font-size: 12px; margin-bottom: 4px; }
  .score-table td { padding: 2px 10px 2px 0; color: var(--text-sec); vertical-align: top; }
  .score-table .pts-cell { color: var(--accent); font-weight: 600; white-space: nowrap; }
  .score-table .letters-cell { color: var(--text-dim); letter-spacing: 1px; }

  .sep { height: 1px; background: var(--surface-alt); margin: 14px 0; }
  .p-label { font-size: 10px; color: var(--text-muted); letter-spacing: 1px;
             text-transform: uppercase; margin-bottom: 10px; }

  /* ── lehekülgimine ── */
  #pager {
    display: none; align-items: center; justify-content: center;
    gap: 12px; padding: 16px 0 8px;
  }
  #pg-info { font-size: 12px; color: var(--text-muted); min-width: 60px; text-align: center; }
</style>
</head>
<body>

<a class="skip-link" href="#body">Hüppa põhisisu juurde</a>

<div class="app-header">
  <a class="nav-brand" href="../index.html">Sõnavarandus</a>
  <div id="top-nav-mount"></div>
  <div class="header-end">
    <a href="../info.html" style="font-size: 12px; color: var(--text-dim); text-decoration: none; transition: color 0.2s;">Info</a>
  </div>
</div>

<div id="body">
  <div id="list-wrap">
    <div class="page-info-accordion">
      <div class="page-info-header">
        <span class="page-info-icon">ℹ</span>
        <span class="page-info-title">Scrabble'i punktid</span>
        <span class="page-info-toggle">−</span>
      </div>
      <div class="page-info-body open" id="info-body">
        <p class="page-info-desc">Millised eestikeelsed sõnad toovad Scrabble'is kõige rohkem punkte?</p>
        <div class="page-info-stats">
          <div class="stat-row">
            <span class="stat-label">Kokku</span>
            <span class="stat-value" id="stat-total">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Parim</span>
            <span class="stat-value" id="stat-best">—</span>
          </div>
        </div>
      </div>
    </div>
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px; justify-content: space-between;">
      <div id="info" class="header-info" style="font-size: 12px; color: var(--text-muted);"></div>
      <input id="search" class="text-input" type="text" placeholder="Otsi sõna…"
             style="width:160px;" autocomplete="off" spellcheck="false">
    </div>
    <div id="list"></div>
    <div id="pager">
      <button type="button" class="btn btn-sm" id="pg-prev">← Eelmine</button>
      <span id="pg-info"></span>
      <button type="button" class="btn btn-sm" id="pg-next">Järgmine →</button>
    </div>
  </div>

  <div id="panel" class="side-panel">
    <div id="panel-inner" class="side-panel__inner">
      <div id="p-word"></div>
      <div id="p-score"></div>
      <div id="p-letters" class="letter-row"></div>

      <div class="sep"></div>

      <div id="rules-toggle" role="button" tabindex="0"
           aria-expanded="false" aria-controls="rules-body">
        <span id="rules-arrow">▶</span>
        <span>Tähevaartused</span>
      </div>
      <div id="rules-body" role="region">
        <table class="score-table" id="score-table"></table>
      </div>
    </div>
  </div>
</div>

<script>
const PAGE_SIZE = 50;
let allWords = [], currentWords = [], maxScore = 1, currentPage = 1, sortKey = "score";
let scoreMap = {};
window.tileCounts = {};

function buildRow(d, rank) {
  const row = document.createElement("div");
  row.className = "row";
  const pct = (d.score / maxScore * 100).toFixed(1);
  row.innerHTML = `
    <span class="rank">${rank}</span>
    <a class="word" href="https://sonaveeb.ee/search/unif/dlall/dsall/${encodeURIComponent(d.word)}/1/est" target="_blank" rel="noopener">${d.word}</a>
    <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
    <span class="pts">${d.score}</span>`;
  row.addEventListener("click", () => openPanel(d, row));
  return row;
}

function getMaxVal(words) {
  if (sortKey === "length") return Math.max(...words.map(w => w.len), 1);
  return Math.max(...words.map(w => w.score), 1);
}

function getSorted(words) {
  return [...words].sort((a, b) => {
    if (sortKey === "length") return b.len - a.len;
    return b.score - a.score;
  });
}

function renderList(words) {
  currentWords = words;
  maxScore = getMaxVal(words);
  const list  = document.getElementById("list");
  const start = (currentPage - 1) * PAGE_SIZE;
  list.innerHTML = "";
  words.slice(start, start + PAGE_SIZE).forEach((d, i) =>
    list.appendChild(buildRow(d, start + i + 1)));
  document.getElementById("list-wrap").scrollTop = 0;
  renderPager();
}

function renderPager() {
  const total = Math.ceil(currentWords.length / PAGE_SIZE);
  const pager = document.getElementById("pager");
  pager.style.display = total > 1 ? "flex" : "none";
  document.getElementById("pg-info").textContent = `${currentPage} / ${total}`;
  document.getElementById("pg-prev").disabled = currentPage <= 1;
  document.getElementById("pg-next").disabled = currentPage >= total;
}

document.getElementById("pg-prev").addEventListener("click", () => {
  if (currentPage > 1) { currentPage--; renderList(currentWords); }
});
document.getElementById("pg-next").addEventListener("click", () => {
  if (currentPage < Math.ceil(currentWords.length / PAGE_SIZE)) { currentPage++; renderList(currentWords); }
});

function openPanel(d, row) {
  document.querySelectorAll(".row.selected").forEach(r => r.classList.remove("selected"));
  if (row) row.classList.add("selected");

  document.getElementById("p-word").textContent  = d.word;
  document.getElementById("p-score").textContent = `${d.score} punkti · ${d.len} tähte`;

  const lettersEl = document.getElementById("p-letters");
  lettersEl.innerHTML = "";
  d.letters.forEach(l => {
    const tile = document.createElement("div");
    tile.className = "letter-tile";
    const count = window.tileCounts[l.ch] || 0;
    tile.innerHTML = `<span class="tile-ch">${l.ch}</span><span class="tile-pts">${l.pts}</span><span style="font-size:9px;color:var(--text-muted);margin-top:2px">${count}×</span>`;
    tile.title = `Mängus ${count} klotsid`;
    lettersEl.appendChild(tile);
  });

  document.getElementById("panel").classList.add("open");
}

// ── tähevaartuste tabel paneelisse ────────────────────────────
function buildScoreTable(scores) {
  const grouped = {};
  Object.entries(scores).forEach(([ch, pts]) => {
    if (!grouped[pts]) grouped[pts] = [];
    grouped[pts].push(ch);
  });
  const table = document.getElementById("score-table");
  Object.keys(grouped).sort((a,b) => a - b).forEach(pts => {
    const letters = grouped[pts].sort().join("  ");
    const tr = document.createElement("tr");
    tr.innerHTML = `<td class="pts-cell">${pts} p</td><td class="letters-cell">${letters}</td>`;
    table.appendChild(tr);
  });
}

// ── info accordion ────────────────────────────────────────────
const infoHeader = document.querySelector(".page-info-header");
const infoBody = document.getElementById("info-body");
const infoToggle = document.querySelector(".page-info-toggle");
infoHeader.addEventListener("click", () => {
  const open = infoBody.classList.toggle("open");
  infoToggle.textContent = open ? "−" : "+";
  infoHeader.setAttribute("aria-expanded", open);
});
infoHeader.addEventListener("keydown", e => {
  if (e.key === "Enter" || e.key === " ") { e.preventDefault(); infoHeader.click(); }
});

// ── tähevaartuste accordion ────────────────────────────────────
const toggle = document.getElementById("rules-toggle");
const body   = document.getElementById("rules-body");
const arrow  = document.getElementById("rules-arrow");
toggle.addEventListener("click", () => {
  const open = body.classList.toggle("open");
  arrow.classList.toggle("open", open);
  toggle.setAttribute("aria-expanded", open);
});
toggle.addEventListener("keydown", e => {
  if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggle.click(); }
});

// ── sorteerimine ─────────────────────────────────────────────
// Alati skoori järgi, ei kasutaja seadeid

// ── otsing ───────────────────────────────────────────────────
document.getElementById("search").addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  const filtered = q ? allWords.filter(d => d.word.includes(q)) : allWords;
  currentPage = 1;
  renderList(getSorted(filtered));
  document.getElementById("info").textContent =
    q ? `${filtered.length} vastet` : `top ${allWords.length}`;
});

// ── lae andmed ───────────────────────────────────────────────
fetch("../data/scrabble.json")
  .then(r => r.json())
  .then(data => {
    allWords  = data.words;
    scoreMap  = data.scores;
    window.tileCounts = data.tile_counts || {};
    document.getElementById("info").textContent =
      `top ${allWords.length} / ${data.total_valid} sõnast`;

    // Arvuta statistika
    const totalValid = data.total_valid;
    const bestWord = allWords.length > 0 ? allWords[0] : null;

    document.getElementById("stat-total").textContent = totalValid.toLocaleString("et-EE");
    if (bestWord) {
      document.getElementById("stat-best").textContent = `${bestWord.word} (${bestWord.score} p)`;
    }

    buildScoreTable(scoreMap);
    renderList(getSorted(allWords));
    if (allWords.length) openPanel(allWords[0], null);
  })
  .catch(() => {
    document.getElementById("list").textContent =
      "⚠ scrabble.json puudub — käivita prepare_data.py";
  });
</script>


<script src="../js/nav-config.js"></script>
<script src="../js/nav-render.js"></script>
</body>
</html>
