<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Sõnavarandus - Sünonüümitihedus</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #body { display: flex; flex: 1; overflow: hidden; background: var(--bg); }
  #list-wrap { flex: 1; overflow-y: auto; padding: 16px 24px 40px; }

  .row {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 8px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background .1s;
  }
  .row:hover    { background: var(--row-hover); }
  .row.selected { background: var(--row-selected); }

  .row-words {
    flex: 1; font-size: 13px; color: var(--text-sec);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .row-words strong { color: var(--text); font-weight: 600; }
  .bar-wrap { width: 120px; flex-shrink: 0; height: 10px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar { height: 100%; border-radius: 3px; background: var(--accent); transition: width .3s ease; }
  .num {
    width: 32px; flex-shrink: 0; text-align: right;
    font-size: 12px; color: var(--text-dim); font-variant-numeric: tabular-nums;
  }

  #p-count { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  #p-def   { font-size: 13px; color: var(--text-sec); font-style: italic;
             margin-bottom: 16px; line-height: 1.5; }
  .sep     { height: 1px; background: var(--surface-alt); margin: 12px 0; }
  .p-label { font-size: 10px; color: var(--text-muted); letter-spacing: 1px;
             text-transform: uppercase; margin-bottom: 10px; }
  .word-pill {
    display: inline-block; margin: 3px 4px 3px 0;
    padding: 4px 12px; border-radius: 20px; font-size: 13px;
    background: var(--accent-light); color: var(--accent);
    cursor: pointer; transition: background .1s, color .1s;
  }
  .word-pill:hover { background: var(--accent-light); color: var(--accent-hover); text-decoration: underline; }

  #pager {
    display: none; align-items: center; justify-content: center;
    gap: 12px; padding: 16px 0 8px;
  }
  #pg-info { font-size: 12px; color: var(--text-muted); min-width: 60px; text-align: center; }

</style>
</head>
<body>

<a class="skip-link" href="#body">Hüppa põhisisu juurde</a>

<div class="app-header">
  <a class="nav-brand" href="../index.html">Sõnavarandus</a>
  <div id="top-nav-mount"></div>
  <div class="header-end">
    <a href="../info.html" style="font-size: 12px; color: var(--text-dim); text-decoration: none; transition: color 0.2s;">Info</a>
  </div>
</div>

<div id="body">
  <div id="list-wrap">
    <div id="info-accordion" class="page-info-accordion open">
      <div class="page-info-header">
        <span class="page-info-icon">ℹ</span>
        <span class="page-info-title">Sünonüümitihedus</span>
        <span class="page-info-toggle">−</span>
      </div>
      <div class="page-info-body open">
        <div class="page-info-desc">Sünonüümid on eri sõnad, mis on sama tähendusega.</div>
        <div class="page-info-stats">
          <div class="stat-row">
            <span class="stat-label">Kokku</span>
            <span class="stat-value" id="stat-total">-</span>
          </div>
        </div>
      </div>
    </div>

    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px; justify-content: space-between;">
      <div id="info" class="header-info" style="font-size: 12px; color: var(--text-muted);"></div>
      <input id="search" class="text-input" type="text" placeholder="Otsi…" style="width: 200px;" autocomplete="off" spellcheck="false">
    </div>

    <div id="list"></div>
    <div id="pager">
      <button type="button" class="btn btn-sm" id="pg-prev">← Eelmine</button>
      <span id="pg-info"></span>
      <button type="button" class="btn btn-sm" id="pg-next">Järgmine →</button>
    </div>
  </div>

  <div id="panel" class="side-panel">
    <div id="panel-inner" class="side-panel__inner">
      <div id="p-count"></div>
      <div id="p-def"></div>
      <div class="sep"></div>
      <div class="p-label">Sünonüümid</div>
      <div id="p-words"></div>
    </div>
  </div>
</div>

<script>
const PAGE_SIZE = 50;
let allMeanings = [], currentMeanings = [], maxCount = 1, currentPage = 1;

function rowLabel(d) {
  const src   = d.preview || d.words;
  const first = src[0];
  const rest  = src.slice(1, 4).join(" / ");
  const more  = d.count > 4 ? ` <span style="color:var(--text-ghost)">+${d.count - 4}</span>` : "";
  return `<strong>${first}</strong>${rest ? " / " + rest : ""}${more}`;
}

function buildRow(d) {
  const row = document.createElement("div");
  row.className = "row";
  const pct = (d.count / maxCount * 100).toFixed(1);
  row.innerHTML = `
    <span class="row-words">${rowLabel(d)}</span>
    <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
    <span class="num">${d.count}</span>`;
  row.addEventListener("click", () => openPanel(d, row));
  return row;
}

function renderList(meanings) {
  currentMeanings = meanings;
  maxCount = meanings.length ? meanings[0].count : 1;
  const list  = document.getElementById("list");
  const start = (currentPage - 1) * PAGE_SIZE;
  list.innerHTML = "";
  meanings.slice(start, start + PAGE_SIZE).forEach(d => list.appendChild(buildRow(d)));
  document.getElementById("list-wrap").scrollTop = 0;
  renderPager();
}

function renderPager() {
  const total = Math.ceil(currentMeanings.length / PAGE_SIZE);
  const pager = document.getElementById("pager");
  pager.style.display = total > 1 ? "flex" : "none";
  document.getElementById("pg-info").textContent = `${currentPage} / ${total}`;
  document.getElementById("pg-prev").disabled = currentPage <= 1;
  document.getElementById("pg-next").disabled = currentPage >= total;
}

document.getElementById("pg-prev").addEventListener("click", () => {
  if (currentPage > 1) { currentPage--; renderList(currentMeanings); }
});
document.getElementById("pg-next").addEventListener("click", () => {
  if (currentPage < Math.ceil(currentMeanings.length / PAGE_SIZE)) { currentPage++; renderList(currentMeanings); }
});

function openPanel(d, row) {
  document.querySelectorAll(".row.selected").forEach(r => r.classList.remove("selected"));
  if (row) row.classList.add("selected");

  document.getElementById("p-count").textContent = `${d.count} sünonüümi`;
  document.getElementById("p-def").textContent   = d.definition || "";
  document.getElementById("p-words").innerHTML   = d.words
    .map(w => `<a class="word-pill" href="https://sonaveeb.ee/search/unif/dlall/dsall/${encodeURIComponent(w)}/1/est" target="_blank" rel="noopener">${w}</a>`)
    .join("");

  document.getElementById("panel").classList.add("open");
}

document.getElementById("search").addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  const filtered = q
    ? allMeanings.filter(d => d.words.some(w => w.toLowerCase().includes(q)))
    : allMeanings;
  currentPage = 1;
  renderList(filtered);
  document.getElementById("info").textContent = `${filtered.length} tähendust`;
});

// Accordion toggle
document.querySelector(".page-info-header").addEventListener("click", function() {
  const body = this.nextElementSibling;
  const toggle = this.querySelector(".page-info-toggle");
  const isOpen = body.classList.toggle("open");
  toggle.textContent = isOpen ? "−" : "+";
});

fetch("../data/synonyms.json")
  .then(r => r.json())
  .then(data => {
    allMeanings = data.meanings;
    document.getElementById("info").textContent =
      `${allMeanings.length} tähendust sünonüümidega`;

    // Calculate total synonyms count for the stat
    const totalSynonyms = allMeanings.reduce((sum, d) => sum + d.count, 0);
    document.getElementById("stat-total").textContent = totalSynonyms;

    renderList(allMeanings);
    if (allMeanings.length) {
      const firstRow = document.querySelector("#list .row");
      openPanel(allMeanings[0], firstRow);
    }
  })
  .catch(() => {
    document.getElementById("list").textContent =
      "⚠ synonyms.json puudub — käivita prepare_data.py";
  });
</script>


<script src="../js/nav-config.js"></script>
<script src="../js/nav-render.js"></script>
</body>
</html>
