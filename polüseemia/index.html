<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sõnavarandus - Polüseemia</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #body { display: flex; flex: 1; overflow: hidden; }
  #list-wrap { flex: 1; overflow-y: auto; padding: 16px 24px 40px; background: var(--bg); }

  .row {
    display: flex; align-items: center; gap: 12px;
    padding: 5px 8px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background .12s;
  }
  .row:hover    { background: var(--row-hover); }
  .row.selected { background: var(--row-selected); }

  .word {
    width: 160px; flex-shrink: 0; font-size: 13px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .bar-wrap { flex: 1; height: 12px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar { height: 100%; border-radius: 3px; background: var(--accent); transition: width .3s ease; }
  .num {
    width: 28px; flex-shrink: 0; text-align: right;
    font-size: 12px; color: var(--text-dim); font-variant-numeric: tabular-nums;
  }

  @media (max-width: 640px) {
    .word { width: 100px; }
  }

  #p-word  { font-size: 24px; font-weight: 300; letter-spacing: 1px; color: var(--text); margin-bottom: 4px; }
  #p-count { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
  .m-item  { margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid var(--surface-alt); }
  .m-item:last-child { border-bottom: none; }
  .m-num   { font-size: 10px; color: var(--text-muted); margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase; }
  .m-def   { font-size: 13px; color: var(--text-sec); line-height: 1.6; }
  .m-def.empty { color: var(--text-ghost); font-style: italic; }

  #pager {
    display: none; align-items: center; justify-content: center;
    gap: 16px; padding: 16px 0 8px; flex-wrap: nowrap;
  }
  #pg-numbers {
    display: flex; align-items: center; gap: 8px;
  }
  .pg-btn {
    width: 36px; height: 36px; padding: 0; border: 1px solid var(--border);
    border-radius: 50%; background: var(--bg); color: var(--text-sec);
    font-size: 12px; cursor: pointer; transition: all .1s; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .pg-btn:hover:not(:disabled) { background: var(--surface-alt); border-color: var(--accent); }
  .pg-btn.current { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<a class="skip-link" href="#body">Hüppa põhisisu juurde</a>

<div class="app-header">
  <a class="nav-brand" href="../index.html">Sõnavarandus</a>
  <div id="top-nav-mount"></div>
</div>

<div id="body">
  <div id="list-wrap">
    <div class="page-info-accordion">
      <div class="page-info-header" id="accordion-header" style="cursor: pointer;">
        <div class="page-info-icon">ℹ</div>
        <div class="page-info-title">Polüseemia</div>
        <div class="page-info-toggle" id="accordion-toggle">−</div>
      </div>
      <div class="page-info-body" id="accordion-body" style="display: block;">
        <div class="page-info-desc">Sõnad reastatud tähenduste arvu järgi.</div>
      </div>
    </div>

    <div id="list"></div>
    <div id="pager">
      <button type="button" class="btn btn-sm" id="pg-prev">← Eelmine</button>
      <div id="pg-numbers"></div>
      <button type="button" class="btn btn-sm" id="pg-next">Järgmine →</button>
    </div>
  </div>

  <div id="panel" class="side-panel">
    <div id="panel-inner" class="side-panel__inner">
      <div id="p-word"></div>
      <div id="p-count"></div>
      <div id="p-defs"></div>
    </div>
  </div>
</div>

<script>
const PAGE_SIZE = 50;
let allWords = [], currentWords = [], maxCount = 1, currentPage = 1, selected = null;

// Accordion toggle
document.getElementById("accordion-header").addEventListener("click", function() {
  const body = document.getElementById("accordion-body");
  const toggle = document.getElementById("accordion-toggle");
  const isOpen = body.style.display !== "none";
  body.style.display = isOpen ? "none" : "block";
  toggle.textContent = isOpen ? "+" : "−";
});

function buildRow(d) {
  const row = document.createElement("div");
  row.className = "row";
  row.dataset.word = d.word;
  const pct     = (d.count / maxCount * 100).toFixed(1);
  const opacity = 0.45 + (d.count / maxCount) * 0.55;
  row.innerHTML = `
    <span class="word">${d.word}</span>
    <div class="bar-wrap"><div class="bar" style="width:${pct}%;opacity:${opacity}"></div></div>
    <span class="num">${d.count}</span>`;
  row.addEventListener("click", () => openPanel(d, row));
  return row;
}

function renderList(words) {
  currentWords = words;
  const list  = document.getElementById("list");
  const start = (currentPage - 1) * PAGE_SIZE;
  list.innerHTML = "";
  words.slice(start, start + PAGE_SIZE).forEach(d => list.appendChild(buildRow(d)));
  document.getElementById("list-wrap").scrollTop = 0;
  renderPager();
}

function renderPager() {
  const total      = currentWords.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const pager      = document.getElementById("pager");
  pager.style.display = totalPages > 1 ? "flex" : "none";

  // Render page numbers with range
  const numbersDiv = document.getElementById("pg-numbers");
  numbersDiv.innerHTML = "";

  const range = 5;
  let start = Math.max(1, currentPage - Math.floor(range / 2));
  let end = Math.min(totalPages, start + range - 1);
  if (end - start < range - 1) start = Math.max(1, end - range + 1);

  // Always show page 1
  if (start > 1) {
    const btn1 = document.createElement("button");
    btn1.className = "pg-btn";
    btn1.textContent = "1";
    btn1.onclick = () => { currentPage = 1; renderList(currentWords); };
    numbersDiv.appendChild(btn1);

    if (start > 2) {
      const dots = document.createElement("span");
      dots.textContent = "…";
      dots.style.opacity = "0.5";
      numbersDiv.appendChild(dots);
    }
  }

  for (let i = start; i <= end; i++) {
    const btn = document.createElement("button");
    btn.className = `pg-btn ${i === currentPage ? "current" : ""}`;
    btn.textContent = i;
    btn.onclick = () => { currentPage = i; renderList(currentWords); };
    numbersDiv.appendChild(btn);
  }

  // Always show last page
  if (end < totalPages) {
    if (end < totalPages - 1) {
      const dots = document.createElement("span");
      dots.textContent = "…";
      dots.style.opacity = "0.5";
      numbersDiv.appendChild(dots);
    }

    const btnLast = document.createElement("button");
    btnLast.className = "pg-btn";
    btnLast.textContent = totalPages;
    btnLast.onclick = () => { currentPage = totalPages; renderList(currentWords); };
    numbersDiv.appendChild(btnLast);
  }

  document.getElementById("pg-prev").disabled = currentPage <= 1;
  document.getElementById("pg-next").disabled = currentPage >= totalPages;
}

document.getElementById("pg-prev").addEventListener("click", () => {
  if (currentPage > 1) { currentPage--; renderList(currentWords); }
});
document.getElementById("pg-next").addEventListener("click", () => {
  if (currentPage < Math.ceil(currentWords.length / PAGE_SIZE)) { currentPage++; renderList(currentWords); }
});

function openPanel(d, row) {
  document.querySelectorAll(".row.selected").forEach(r => r.classList.remove("selected"));
  if (row) row.classList.add("selected");
  selected = d.word;
  document.getElementById("p-word").innerHTML = `<a href="https://sonaveeb.ee/search/unif/dlall/dsall/${encodeURIComponent(d.word)}/1/est" target="_blank" rel="noopener" style="color: var(--accent); text-decoration: none;">${d.word}</a>`;
  document.getElementById("p-count").textContent = `${d.count} tähendust`;
  document.getElementById("p-defs").innerHTML = d.meanings.map(m => {
    const num = m.level2 > 1 ? `${m.level1}.${m.level2 - 1}` : `${m.level1}.`;
    return `
    <div class="m-item">
      <div class="m-num">${num}</div>
      <div class="m-def${m.def ? "" : " empty"}">${m.def || "seletus puudub"}</div>
    </div>`;
  }).join("");
  document.getElementById("panel").classList.add("open");
}

fetch("../data/polyseemia.json")
  .then(r => r.json())
  .then(data => {
    allWords = data.words.filter(w => w.count >= 2);
    maxCount = allWords[0]?.count || 1;

    renderList(allWords);
  })
  .catch(() => {
    document.getElementById("list").textContent = "⚠ polyseemia.json puudub — käivita prepare_data.py";
  });
</script>


<script src="../js/nav-config.js"></script>
<script src="../js/nav-render.js"></script>
</body>
</html>
