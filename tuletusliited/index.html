<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Tuletusliited</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #body { display: flex; flex: 1; overflow: hidden; background: var(--bg); }
  #list-wrap { flex: 1; overflow-y: auto; padding: 16px 24px 40px; }

  .row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background .1s;
  }
  .row:hover    { background: var(--row-hover); }
  .row.selected { background: var(--row-selected); }

  .suffix {
    width: 90px; flex-shrink: 0;
    font-size: 14px; font-weight: 600; color: var(--text);
    font-family: 'Courier New', monospace; letter-spacing: 0.5px;
  }
  .bar-wrap { flex: 1; height: 12px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar { height: 100%; border-radius: 3px; background: var(--accent); transition: width .3s ease; }
  .num {
    width: 40px; flex-shrink: 0; text-align: right;
    font-size: 12px; color: var(--text-dim); font-variant-numeric: tabular-nums;
  }

  #p-suffix { font-size: 30px; font-weight: 300; color: var(--text); margin-bottom: 4px; font-family: 'Courier New', monospace; letter-spacing: 1px; }
  #p-count  { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
  .sep      { height: 1px; background: var(--surface-alt); margin: 14px 0; }
  .p-label  { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }

  .pair-item {
    display: flex; align-items: baseline; gap: 8px;
    padding: 5px 0; border-bottom: 1px solid var(--surface-alt);
  }
  .pair-item:last-child { border-bottom: none; }
  .pair-base    { font-size: 13px; color: var(--text-dim); min-width: 80px; }
  .pair-arrow   { font-size: 11px; color: var(--text-ghost); flex-shrink: 0; }
  .pair-stem    { font-size: 13px; color: var(--text); }
  .pair-suffix  { font-size: 13px; color: var(--accent); font-weight: 600; }

  #pager {
    display: none; align-items: center; justify-content: center;
    gap: 12px; padding: 16px 0 8px;
  }
  #pg-info { font-size: 12px; color: var(--text-muted); min-width: 60px; text-align: center; }
</style>
</head>
<body>

<a class="skip-link" href="#body">Hüppa põhisisu juurde</a>

<div class="app-header">
  <nav class="breadcrumb" aria-label="Navigatsioon">
    <a class="breadcrumb-home" href="../index.html">Keele peal</a>
    <span class="breadcrumb-sep" aria-hidden="true">›</span>
    <span class="breadcrumb-current">Tuletusliited</span>
  </nav>
  <div class="header-end">
    <span id="info" class="header-info"></span>
    <input id="search" class="text-input" type="text" placeholder="Otsi liidet…"
           style="width:160px" autocomplete="off" spellcheck="false">
  </div>
</div>

<div id="body">
  <div id="list-wrap">
    <div id="list"></div>
    <div id="pager">
      <button type="button" class="btn btn-sm" id="pg-prev">← Eelmine</button>
      <span id="pg-info"></span>
      <button type="button" class="btn btn-sm" id="pg-next">Järgmine →</button>
    </div>
  </div>

  <div id="panel" class="side-panel">
    <div id="panel-inner" class="side-panel__inner">
      <div id="p-suffix"></div>
      <div id="p-count"></div>
      <div class="sep"></div>
      <div class="p-label">Tuletised</div>
      <div id="p-examples"></div>
    </div>
  </div>
</div>

<script>
const PAGE_SIZE = 50;
let allSuffixes = [], currentSuffixes = [], maxCount = 1, currentPage = 1;

function buildRow(d) {
  const row = document.createElement("div");
  row.className = "row";
  const pct = (d.count / maxCount * 100).toFixed(2);
  row.innerHTML = `
    <span class="suffix">${d.suffix}</span>
    <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
    <span class="num">${d.count}</span>`;
  row.addEventListener("click", () => openPanel(d, row));
  return row;
}

function renderList(suffixes) {
  currentSuffixes = suffixes;
  maxCount = suffixes.length ? suffixes[0].count : 1;
  const list = document.getElementById("list");
  const start = (currentPage - 1) * PAGE_SIZE;
  list.innerHTML = "";
  suffixes.slice(start, start + PAGE_SIZE).forEach(d => list.appendChild(buildRow(d)));
  document.getElementById("list-wrap").scrollTop = 0;
  renderPager();
}

function renderPager() {
  const totalPages = Math.ceil(currentSuffixes.length / PAGE_SIZE);
  const pager = document.getElementById("pager");
  pager.style.display = totalPages > 1 ? "flex" : "none";
  document.getElementById("pg-info").textContent = `${currentPage} / ${totalPages}`;
  document.getElementById("pg-prev").disabled = currentPage <= 1;
  document.getElementById("pg-next").disabled = currentPage >= totalPages;
}

document.getElementById("pg-prev").addEventListener("click", () => {
  if (currentPage > 1) { currentPage--; renderList(currentSuffixes); }
});
document.getElementById("pg-next").addEventListener("click", () => {
  if (currentPage < Math.ceil(currentSuffixes.length / PAGE_SIZE)) { currentPage++; renderList(currentSuffixes); }
});

function openPanel(d, row) {
  document.querySelectorAll(".row.selected").forEach(r => r.classList.remove("selected"));
  if (row) row.classList.add("selected");

  document.getElementById("p-suffix").textContent = d.suffix;
  document.getElementById("p-count").textContent = `${d.count} tuletist`;

  const sfxLen = d.suffix.length - 1; // ilma '-'ta
  document.getElementById("p-examples").innerHTML = d.examples.map(ex => `
    <div class="pair-item">
      <span class="pair-base">${ex.base}</span>
      <span class="pair-arrow">→</span>
      <span class="pair-stem">${ex.derived.slice(0, ex.derived.length - sfxLen)}</span><span class="pair-suffix">${ex.derived.slice(ex.derived.length - sfxLen)}</span>
    </div>`).join("");

  document.getElementById("panel").classList.add("open");
}

document.getElementById("search").addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  const filtered = q
    ? allSuffixes.filter(s => s.suffix.toLowerCase().includes(q))
    : allSuffixes;
  currentPage = 1;
  renderList(filtered);
  document.getElementById("info").textContent = `${filtered.length} liidet`;
});

fetch("../data/derivation.json")
  .then(r => r.json())
  .then(data => {
    allSuffixes = data.suffixes;
    document.getElementById("info").textContent =
      `${allSuffixes.length} liidet · ${data.total} tuletist`;
    renderList(allSuffixes);
  })
  .catch(() => {
    document.getElementById("list").textContent =
      "⚠ derivation.json puudub — käivita prepare_data.py";
  });
</script>
</body>
</html>
