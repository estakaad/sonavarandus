<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Sõnavarandus - Tähenduste kiirtee</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  #body { display: flex; flex: 1; overflow: hidden; background: var(--bg); }
  #list-wrap { flex: 1; overflow-y: auto; padding: 16px 24px 40px; }

  #wrap {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 36px; padding: 20px;
  }

  /* ── sisestusalad ── */
  #inputs { display: flex; align-items: flex-start; gap: 16px; }
  .input-group { position: relative; display: flex; flex-direction: column; gap: 6px; }
  .input-label { font-size: 13px; letter-spacing: 1px; color: var(--text-muted); text-align: center; }
  .word-input { width: 240px; font-size: 16px; padding: 10px 18px; }
  #btn-row .btn { font-size: 16px; padding: 9px 22px; }

  .suggestions {
    position: absolute; top: calc(100% + 2px); left: 0; width: 240px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; display: none; z-index: 50;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .sug-item { padding: 7px 16px; cursor: pointer; font-size: 16px; color: var(--text-sec); transition: background .1s; }
  .sug-item:hover, .sug-item.active { background: var(--row-hover); color: var(--accent); }

  .arrow-mid { font-size: 20px; color: var(--text-ghost); margin-top: 30px; flex-shrink: 0; }

  /* ── nupud ── */
  #btn-row { display: flex; gap: 10px; }

  /* ── tulemus ── */
  #result { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; max-width: 480px; }
  #msg { font-size: 16px; color: var(--text-muted); text-align: center; line-height: 1.6; }
  #path-len { font-size: 15px; color: var(--text-muted); letter-spacing: .5px; }

  /* ── tee (vertikaalne, raudteestiiliga) ── */
  #chain-wrap {
    position: relative; width: 100%;
    padding-left: 28px;
  }
  /* ühendav raudtee */
  #chain-wrap::before {
    content: '';
    position: absolute; left: 7px; top: 18px; bottom: 18px;
    width: 2px;
    background: linear-gradient(to bottom, var(--accent), var(--border));
    border-radius: 1px;
  }

  #chain { display: flex; flex-direction: column; align-items: flex-start; gap: 0; width: 100%; }

  .chain-node {
    position: relative;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 22px;
    font-size: 16px; color: var(--text); white-space: nowrap;
    animation: fadeIn .3s ease both;
  }
  /* täpp raudteel */
  .chain-node::before {
    content: '';
    position: absolute; left: -24px; top: 50%; transform: translateY(-50%);
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); border: 2px solid var(--bg); z-index: 1;
  }
  .chain-node.start {
    background: var(--accent); color: #fff; border-color: var(--accent);
    font-size: 17px; font-weight: 600;
  }
  .chain-node.start::before { background: var(--accent); width: 12px; height: 12px; left: -26px; }
  .chain-node.end {
    background: var(--accent-light); color: var(--accent);
    border-color: var(--accent); font-size: 17px; font-weight: 600;
  }
  .chain-node.end::before { background: var(--accent); width: 12px; height: 12px; left: -26px; }

  .chain-edge {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 0 3px 6px;
    animation: fadeIn .3s ease both;
  }
  .edge-arrow { font-size: 12px; color: var(--text-ghost); }
  .edge-type  { font-size: 13px; white-space: nowrap; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<a class="skip-link" href="#wrap">Hüppa põhisisu juurde</a>

<div class="app-header">
  <a class="nav-brand" href="../index.html">Sõnavarandus</a>
  <div id="top-nav-mount"></div>
  <div class="header-end">
    <a href="../info.html" style="font-size: 12px; color: var(--text-dim); text-decoration: none; transition: color 0.2s;">Info</a>
  </div>
</div>

<div id="body">
  <div id="list-wrap">
    <div class="page-info-accordion">
      <div class="page-info-header">
        <span class="page-info-icon">ℹ</span>
        <span class="page-info-title">Tähenduste kiirtee</span>
        <span class="page-info-toggle">−</span>
      </div>
      <div class="page-info-body open">
        <p class="page-info-desc">Leia tähendustevahelisi seoseid pidi liikudes lühim tee ühest sõnast teiseni.</p>
        <div class="page-info-stats" id="page-stats">
          <div class="stat-row"><span class="stat-label">Kokku</span><span class="stat-value" id="stat-total">–</span></div>
        </div>
      </div>
    </div>

    <div id="wrap">
      <div id="inputs">
        <div class="input-group">
          <span class="input-label">Algussõna</span>
          <input class="text-input word-input" id="w1" type="text" placeholder="nt käsi" autocomplete="off" spellcheck="false">
          <div class="suggestions" id="s1"></div>
        </div>
        <div class="arrow-mid">→</div>
        <div class="input-group">
          <span class="input-label">Lõppsõna</span>
          <input class="text-input word-input" id="w2" type="text" placeholder="nt jalg" autocomplete="off" spellcheck="false">
          <div class="suggestions" id="s2"></div>
        </div>
      </div>

      <div id="btn-row">
        <button type="button" class="btn btn-primary" id="btn-find">Leia tee</button>
        <button type="button" class="btn" id="btn-random">Juhuslik paar</button>
      </div>

      <div id="result">
        <div id="msg">Sisesta kaks sõna ja vajuta "Leia tee"</div>
        <div id="path-len"></div>
        <div id="chain-wrap" style="display:none"><div id="chain"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
let adjacency = {}, allWords = [];

// Accordion toggle
document.querySelector(".page-info-header").addEventListener("click", function() {
  const body = this.nextElementSibling;
  const toggle = this.querySelector(".page-info-toggle");
  const isOpen = body.classList.toggle("open");
  toggle.textContent = isOpen ? "−" : "+";
});

fetch("../data/graph.json")
  .then(r => r.json())
  .then(data => {
    adjacency = data.adjacency;
    allWords  = Object.keys(adjacency).sort();

    // Arvuta statistikat
    const totalWords = allWords.length;
    document.getElementById("stat-total").textContent = totalWords.toLocaleString("et-EE");
  });

function findPath(start, end) {
  if (!adjacency[start] || !adjacency[end]) return null;
  if (start === end) return [{ word: start, type: null }];
  const queue   = [[{ word: start, type: null }]];
  const visited = new Set([start]);
  let checked   = 0;
  while (queue.length) {
    const path = queue.shift();
    const cur  = path[path.length - 1].word;
    for (const { word: nb, type } of (adjacency[cur] || [])) {
      if (nb === end) return [...path, { word: nb, type }];
      if (!visited.has(nb)) {
        visited.add(nb);
        if (path.length < 10) queue.push([...path, { word: nb, type }]);
        if (++checked > 20000) return null;
      }
    }
  }
  return null;
}

const REL_COLORS = {
  "sarnane": "#4a9eff", "antonüüm": "#ff4466", "vastand": "#ff7733",
  "ülemmõiste": "#cc88ff", "alammõiste": "#33ddbb", "kaashüponüüm": "#55bbff",
  "seotud mõiste": "#77dd77", "soomõiste": "#bb66ff", "liigimõiste": "#44ccee",
  "tervikumõiste": "#ffcc44", "osamõiste": "#ffaa22",
};

function showPath(path) {
  document.getElementById("chain-wrap").style.display = "";
  const chain = document.getElementById("chain");
  const lenEl = document.getElementById("path-len");
  chain.innerHTML = "";
  const steps = path.length - 1;
  path.forEach((item, i) => {
    const node = document.createElement("div");
    node.className = "chain-node" + (i === 0 ? " start" : i === path.length - 1 ? " end" : "");
    node.textContent = item.word;
    node.style.animationDelay = `${i * 80}ms`;
    chain.appendChild(node);
    if (i < path.length - 1) {
      const nextType = path[i + 1].type;
      const edge = document.createElement("div");
      edge.className = "chain-edge";
      edge.style.animationDelay = `${i * 80 + 40}ms`;
      const color = REL_COLORS[nextType] || "var(--text-ghost)";
      edge.innerHTML = `
        <span class="edge-arrow" style="color:${color}">↓</span>
        <span class="edge-type" style="color:${color}">${nextType || ""}</span>`;
      chain.appendChild(edge);
    }
  });
  lenEl.textContent = steps === 1 ? "otsene seos"
    : steps === 0 ? ""
    : `${path[0].word} → ${path[path.length-1].word} · ${steps} sammu`;
}

function setMsg(txt) {
  document.getElementById("msg").textContent = txt;
  document.getElementById("chain").innerHTML = "";
  document.getElementById("path-len").textContent = "";
  document.getElementById("chain-wrap").style.display = "none";
}

document.getElementById("btn-find").addEventListener("click", () => {
  const a = document.getElementById("w1").value.trim();
  const b = document.getElementById("w2").value.trim();
  if (!a || !b) { setMsg("Mõlemad sõnad peavad olema täidetud."); return; }
  if (!adjacency[a]) { setMsg(`„${a}" ei leidu seoste andmestikus.`); return; }
  if (!adjacency[b]) { setMsg(`„${b}" ei leidu seoste andmestikus.`); return; }
  setMsg("Otsin…");
  setTimeout(() => {
    const path = findPath(a, b);
    if (!path) {
      setMsg(`teed sõnade "${a}" ja "${b}" vahel ei leitud (liiga kaugel või ühendus puudub)`);
    } else {
      document.getElementById("msg").textContent = "";
      showPath(path);
    }
  }, 30);
});

document.getElementById("btn-random").addEventListener("click", () => {
  if (!allWords.length) return;
  const pick = () => allWords[Math.floor(Math.random() * allWords.length)];
  document.getElementById("w1").value = pick();
  document.getElementById("w2").value = pick();
  document.getElementById("btn-find").click();
});

function setupAutocomplete(inputId, sugId) {
  const inp = document.getElementById(inputId);
  const sug = document.getElementById(sugId);
  let list = [], activeIdx = -1;
  inp.addEventListener("input", () => {
    const q = inp.value.trim().toLowerCase();
    sug.innerHTML = "";
    if (!q) { sug.style.display = "none"; return; }
    list = allWords.filter(w => w.toLowerCase().startsWith(q)).slice(0, 7);
    if (!list.length) { sug.style.display = "none"; return; }
    activeIdx = -1;
    list.forEach(w => {
      const d = document.createElement("div");
      d.className = "sug-item"; d.textContent = w;
      d.addEventListener("click", () => { inp.value = w; sug.style.display = "none"; });
      sug.appendChild(d);
    });
    sug.style.display = "block";
  });
  inp.addEventListener("keydown", e => {
    const items = sug.querySelectorAll(".sug-item");
    if (e.key === "ArrowDown") activeIdx = Math.min(activeIdx + 1, list.length - 1);
    else if (e.key === "ArrowUp") activeIdx = Math.max(activeIdx - 1, 0);
    else if (e.key === "Enter") {
      if (activeIdx >= 0) inp.value = list[activeIdx];
      sug.style.display = "none"; return;
    } else if (e.key === "Escape") { sug.style.display = "none"; return; }
    items.forEach((el, i) => el.classList.toggle("active", i === activeIdx));
  });
  document.addEventListener("click", e => {
    if (!inp.contains(e.target) && !sug.contains(e.target)) sug.style.display = "none";
  });
}

setupAutocomplete("w1", "s1");
setupAutocomplete("w2", "s2");

document.getElementById("w1").addEventListener("keydown", e => {
  if (e.key === "Tab") { e.preventDefault(); document.getElementById("w2").focus(); }
});
</script>


<script src="../js/nav-config.js"></script>
<script src="../js/nav-render.js"></script>
</body>
</html>
