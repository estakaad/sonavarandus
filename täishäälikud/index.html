<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sõnavarandus - Ainult täishäälikud</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #body { flex: 1; overflow-y: auto; padding: 16px 24px 40px; background: var(--bg); }
  .length-group { margin-bottom: 24px; }
  .length-heading { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
  .length-badge { font-size: 18px; font-weight: 300; color: var(--text); }
  .length-count { font-size: 12px; color: var(--text-muted); }
  .word-pill {
    display: inline-block; margin: 3px 4px 3px 0;
    padding: 5px 14px; border-radius: 20px; font-size: 14px;
    background: var(--surface-alt); color: var(--text-sec);
    letter-spacing: 1px; transition: background .1s, color .1s;
  }
  .word-pill:hover { background: var(--accent-light); color: var(--accent); }
  .word-pill.dim { opacity: 0.25; }
</style>
</head>
<body>

<a class="skip-link" href="#body">Hüppa põhisisu juurde</a>
<div class="app-header">
  <a class="nav-brand" href="../index.html">Sõnavarandus</a>
  <div id="top-nav-mount"></div>
</div>
<div id="body">
  <div class="page-info-accordion">
    <div class="page-info-header">
      <span class="page-info-icon">ℹ</span>
      <span class="page-info-title">Ainult täishäälikud</span>
      <span class="page-info-toggle">−</span>
    </div>
    <div class="page-info-body">
      <p class="page-info-desc">Sõnad mis koosnevad üksnes täishäälikutest.</p>
    </div>
  </div>
  <div style="margin-bottom: 16px;">
    <input id="search" class="text-input" type="text" placeholder="Otsi…" style="width: 100%;" autocomplete="off" spellcheck="false">
  </div>
  <div id="list"></div>
</div>
<script src="../js/utils.js"></script>
<script>
let allGroups = [];

// Accordion toggle
document.querySelector(".page-info-header").addEventListener("click", function() {
  const body = this.nextElementSibling;
  const toggle = this.querySelector(".page-info-toggle");
  body.style.display = getComputedStyle(body).display === "none" ? "block" : "none";
  toggle.textContent = getComputedStyle(body).display === "none" ? "+" : "−";
});

function render(q) {
  const list = document.getElementById("list");
  list.innerHTML = "";
  let totalVisible = 0;
  allGroups.forEach(g => {
    const matched = q ? g.words.filter(w => w.includes(q)) : g.words;
    if (!matched.length && q) return;
    totalVisible += matched.length;
    const sec = document.createElement("div");
    sec.className = "length-group";
    sec.innerHTML = `<div class="length-heading">
      <span class="length-badge">${g.length}-tähelised</span>
      <span class="length-count">${matched.length}</span></div>`;
    const pills = document.createElement("div");
    g.words.forEach(w => {
      const pill = wordLink(w, "word-pill" + (q && !matched.includes(w) ? " dim" : ""));
      pills.appendChild(pill);
    });
    sec.appendChild(pills);
    list.appendChild(sec);
  });
}

document.getElementById("search").addEventListener("input", function() { render(this.value.trim().toLowerCase()); });

fetch("../data/vowelwords.json").then(r=>r.json()).then(data => {
  allGroups = data.groups;

  // Arvuta statistikat
  const totalWords = allGroups.reduce((sum, g) => sum + g.words.length, 0);
  const minLen = Math.min(...allGroups.map(g => g.length));
  const maxLen = Math.max(...allGroups.map(g => g.length));


  render("");
}).catch(() => { document.getElementById("list").textContent = "⚠ vowelwords.json puudub — käivita prepare_data.py"; });
</script>


<script src="../js/nav-config.js"></script>
<script src="../js/nav-render.js"></script>
</body>
</html>
